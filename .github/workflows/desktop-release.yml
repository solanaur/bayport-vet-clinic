name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    defaults:
      run:
        working-directory: bayport-vet-clinic/desktop-shell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bayport-vet-clinic/desktop-shell/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install desktop dependencies
        run: npm ci

      - name: Build mac artifacts
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build windows artifacts
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-release
          path: bayport-vet-clinic/desktop-shell/dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub release (with retry)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(release-assets/**/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          max_attempts=6
          delay_seconds=20
          attempt=1

          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Publish attempt ${attempt}/${max_attempts}..."
            if gh release view "$TAG_NAME" >/dev/null 2>&1; then
              if gh release upload "$TAG_NAME" "${files[@]}" --clobber; then
                echo "Release assets uploaded successfully."
                exit 0
              fi
            else
              if gh release create "$TAG_NAME" "${files[@]}" --generate-notes; then
                echo "Release created successfully."
                exit 0
              fi
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Publish failed (likely transient/rate limit). Retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
              delay_seconds=$((delay_seconds * 2))
            fi
            attempt=$((attempt + 1))
          done

          echo "Release publish failed after ${max_attempts} attempts."
          exit 1
