<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory - Bayport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/bayport-design.css">
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    :root { --soft-teal: #0F5CC0; --bp-primary: #0F5CC0; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header id="bpAppHeader"></header>

  <div class="flex flex-1 min-h-0">
    <aside class="w-72 shrink-0 bg-white border-r border-slate-200 p-5">
      <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Menu</h2>
      <nav id="sidebarNav" class="flex flex-col gap-1 text-sm"></nav>
    </aside>

    <main class="flex-1 min-w-0 p-5 lg:p-8 overflow-y-auto">
      <div class="max-w-5xl mx-auto space-y-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div>
            <h1 class="bp-page-title tracking-tight">Inventory</h1>
          </div>
          <button type="button" id="addBtn" class="bp-btn-primary shrink-0 px-4 py-2 text-sm font-semibold">Add item</button>
        </div>

        <div id="lowStockPanel" class="hidden rounded-lg border bp-panel-tint-yellow overflow-hidden">
          <button type="button" id="lowStockToggle" class="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-[#f9fafb] transition-colors">
            <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-amber-50 text-amber-700" aria-hidden="true">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
            </span>
            <span class="flex-1 min-w-0">
              <span id="lowStockTitle" class="block font-medium text-[#101828]">Items running low</span>
              <span id="lowStockSubtitle" class="block text-xs text-[#667085] mt-0.5">Stock at or below reorder level</span>
            </span>
            <svg id="lowStockChevron" class="w-4 h-4 shrink-0 text-[#667085] transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="lowStockList" class="border-t border-[#EAECF0] px-3 py-2 max-h-56 overflow-y-auto space-y-1"></div>
        </div>

        <div class="bp-table-panel overflow-hidden">
          <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
            <div class="inline-flex rounded-lg bg-slate-100 p-1" role="tablist">
              <button type="button" id="invTabProducts" class="inv-tab px-4 py-1.5 rounded-md text-sm font-medium transition-colors">Products</button>
              <button type="button" id="invTabServices" class="inv-tab px-4 py-1.5 rounded-md text-sm font-medium transition-colors">Services</button>
            </div>
            <input id="invSearch" type="search" class="w-full sm:max-w-xs border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[var(--soft-teal)]/25 focus:border-[var(--soft-teal)] outline-none" placeholder="Search…"/>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-left text-xs font-semibold text-slate-600 uppercase tracking-wide border-b border-slate-200">
                <tr>
                  <th class="px-4 py-3 w-14"></th>
                  <th class="px-4 py-3">Item</th>
                  <th class="px-4 py-3 hidden sm:table-cell">Category</th>
                  <th class="px-4 py-3">Stock</th>
                  <th class="px-4 py-3 text-right">Price</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>

        <p class="text-center">
          <button type="button" id="mergeCatalogBtn" class="text-xs text-slate-400 hover:text-slate-600 underline-offset-2 hover:underline">Load default clinic catalog</button>
        </p>
      </div>
    </main>
  </div>

  <div id="modalRoot"></div>

  <script src="assets/deploy-env.js"></script>
  <script>window.USE_API=true;</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/app-header.js"></script>
  <script>
    guard('inventory');
    if (typeof initBayportAppHeader === "function") initBayportAppHeader(document.getElementById("bpAppHeader"), { accent: "soft-teal" });
    renderSidebar(document.getElementById('sidebarNav'), getRole(), 'inventory.html');

    const tbody = document.getElementById('tbody');
    const modalRoot = document.getElementById('modalRoot');
    const invSearch = document.getElementById('invSearch');
    const lowStockPanel = document.getElementById('lowStockPanel');
    const lowStockList = document.getElementById('lowStockList');
    const lowStockTitle = document.getElementById('lowStockTitle');
    const lowStockChevron = document.getElementById('lowStockChevron');
    const invSummary = document.getElementById('invSummary');
    let allItems = [];
    let invTab = 'products';
    let lowStockExpanded = true;

    window.closeModal = () => { modalRoot.innerHTML = ''; };

    function money(n) {
      return window.formatPrice ? window.formatPrice(n) : Number(n || 0).toFixed(2);
    }

    function isService(i) {
      return (i.category || '').toUpperCase() === 'SERVICE';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    }

    function lowStockItems() {
      return allItems.filter((i) =>
        !isService(i) && i.reorderLevel != null && i.quantity != null && Number(i.quantity) <= Number(i.reorderLevel)
      );
    }

    function itemPhotoUrl(i) {
      const raw = i && i.photo != null ? String(i.photo).trim() : "";
      if (!raw || typeof resolveAssetUrl !== "function") return "";
      return resolveAssetUrl(raw);
    }

    function itemPhotoHtml(i, sizeClass) {
      const cls = sizeClass || "w-10 h-10";
      if (isService(i)) {
        return `<div class="${cls} rounded-lg bg-sky-100 border border-sky-200 flex items-center justify-center text-sky-700 text-[10px] font-bold uppercase shrink-0">Svc</div>`;
      }
      const url = itemPhotoUrl(i);
      if (url) {
        const escUrl = escapeHtml(url);
        return `<div class="${cls} rounded-lg border border-slate-200 bg-slate-50 overflow-hidden shrink-0 relative">
          <img src="${escUrl}" alt="" class="w-full h-full object-cover" loading="lazy" decoding="async" onerror="this.style.display='none';this.nextElementSibling?.classList.remove('hidden')"/>
          <div class="hidden absolute inset-0 flex items-center justify-center text-slate-300 bg-slate-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
        </div>`;
      }
      return `<div class="${cls} rounded-lg border border-slate-200 bg-slate-100 flex items-center justify-center text-slate-400 shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      </div>`;
    }

    function stockSeverity(i) {
      const q = Number(i.quantity);
      if (q <= 0) return "out";
      return "low";
    }

    function baseByTab() {
      return allItems.filter((i) => (invTab === 'services' ? isService(i) : !isService(i)));
    }

    function filteredList() {
      let list = baseByTab();
      const q = (invSearch.value || '').trim().toLowerCase();
      if (q) {
        list = list.filter((i) =>
          (i.name || '').toLowerCase().includes(q) ||
          (i.sku || '').toLowerCase().includes(q) ||
          (i.category || '').toLowerCase().includes(q)
        );
      }
      return list.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    }

    function setInvTab(tab) {
      invTab = tab;
      const on = 'inv-tab px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm';
      const off = 'inv-tab px-4 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900';
      document.getElementById('invTabProducts').className = tab === 'products' ? on : off;
      document.getElementById('invTabServices').className = tab === 'services' ? on : off;
      render();
    }

    function stockHealthBar(i) {
      if (isService(i)) return '';
      const q = Number(i.quantity) || 0;
      const r = Number(i.reorderLevel) || 10;
      const max = Math.max(r * 3, q, 1);
      const pct = Math.min(100, Math.round((q / max) * 100));
      const tone = q <= 0 ? 'bp-health--danger' : q <= r ? 'bp-health--amber' : 'bp-health--green';
      return `<div class="bp-health-bar" title="${q} in stock"><div class="bp-health-bar__track"><div class="bp-health-bar__fill ${tone}" style="width:${pct}%"></div></div></div>`;
    }

    function stockLabel(i) {
      if (isService(i)) return { html: '<span class="text-[#667085]">—</span>', cls: '' };
      const q = Number(i.quantity);
      const r = Number(i.reorderLevel);
      if (q <= 0) {
        return {
          html: `<span class="bp-stock-qty"><span class="bp-status-dot bp-status-dot--red"></span>Out of stock</span>`,
          cls: '',
        };
      }
      if (r != null && !Number.isNaN(r) && q <= r) {
        return {
          html: `<span class="bp-stock-qty"><span class="bp-status-dot bp-status-dot--amber"></span>${q} left</span>`,
          cls: '',
        };
      }
      return {
        html: `<span class="bp-stock-qty"><span class="bp-status-dot bp-status-dot--green"></span>${q}</span>`,
        cls: '',
      };
    }

    function updateLowStockPanel() {
      const low = lowStockItems().sort((a, b) => (Number(a.quantity) || 0) - (Number(b.quantity) || 0));
      const outCount = low.filter((i) => Number(i.quantity) <= 0).length;

      if (!low.length) {
        lowStockPanel.classList.add("hidden");
        return;
      }

      lowStockPanel.classList.remove("hidden");
      lowStockTitle.textContent =
        outCount > 0
          ? `${low.length} item${low.length === 1 ? "" : "s"} need attention (${outCount} out of stock)`
          : `${low.length} item${low.length === 1 ? "" : "s"} running low`;

      lowStockList.classList.toggle("hidden", !lowStockExpanded);
      lowStockChevron.style.transform = lowStockExpanded ? "rotate(180deg)" : "rotate(0deg)";

      lowStockList.innerHTML = low
        .map((i) => {
          const sev = stockSeverity(i);
          const qty = Number(i.quantity) || 0;
          const reorder = i.reorderLevel ?? "—";
          const badge =
            sev === "out"
              ? `<span class="bp-badge bp-badge--danger">Out</span>`
              : `<span class="bp-badge bp-badge--pending">Low</span>`;
          const dot = sev === "out" ? "bp-status-dot--red" : "bp-status-dot--amber";
          return `<button type="button" class="low-stock-item w-full flex items-center gap-3 rounded-lg px-2 py-2 hover:bg-[#f9fafb] text-left transition-colors" data-id="${i.id}">
            ${itemPhotoHtml(i, "w-9 h-9")}
            <span class="flex-1 min-w-0">
              <span class="block font-medium text-slate-900 truncate text-sm">${escapeHtml(i.name || "")}</span>
              <span class="block text-xs text-slate-500 font-mono truncate">${escapeHtml(i.sku || "")}</span>
            </span>
            <span class="shrink-0 text-right">
              ${badge}
              <span class="block text-xs tabular-nums mt-0.5 bp-stock-qty justify-end"><span class="bp-status-dot ${dot}"></span>${qty} <span class="text-slate-400 font-normal">/ ${reorder}</span></span>
            </span>
          </button>`;
        })
        .join("");

      lowStockList.querySelectorAll(".low-stock-item").forEach((btn) => {
        btn.onclick = () => openForm(Number(btn.getAttribute("data-id")));
      });
    }

    function updateSummary() {
      const products = allItems.filter((i) => !isService(i));
      const services = allItems.filter(isService);
      if (invSummary) invSummary.textContent = `${products.length} products · ${services.length} services`;
      updateLowStockPanel();
    }

    function render() {
      const items = filteredList();
      updateSummary();

      if (!allItems.length) {
        tbody.innerHTML = `<tr><td colspan="5">${typeof bpEmptyState === "function" ? bpEmptyState("No inventory yet.", "box", "bp-empty-state--table") : `<div class="px-4 py-16 text-center text-slate-500">No inventory yet.</div>`}</td></tr>`;
        return;
      }

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="5">${typeof bpEmptyState === "function" ? bpEmptyState(`No ${invTab === "services" ? "services" : "products"} match your search.`, "search", "bp-empty-state--table") : `<div class="px-4 py-12 text-center text-slate-500">No matches.</div>`}</td></tr>`;
        return;
      }

      const lowIds = new Set(lowStockItems().map((x) => x.id));
      tbody.innerHTML = items.map((i) => {
        const st = stockLabel(i);
        return `
        <tr class="border-t border-slate-100 cursor-pointer inv-row ${lowIds.has(i.id) ? "bg-[#fffbeb]" : ""}" data-id="${i.id}">
          <td class="px-4 py-3 align-middle">${itemPhotoHtml(i)}</td>
          <td class="px-4 py-3">
            <div class="font-medium text-slate-900">${escapeHtml(i.name || '')}</div>
            <div class="text-xs text-slate-400 font-mono mt-0.5">${escapeHtml(i.sku || '')}</div>
          </td>
          <td class="px-4 py-3 text-slate-600 hidden sm:table-cell">${escapeHtml(i.category || '—')}</td>
          <td class="px-4 py-3 ${st.cls}">
            <div>${st.html}</div>
            ${stockHealthBar(i)}
          </td>
          <td class="px-4 py-3 text-right tabular-nums font-medium">₱${money(i.unitPrice)}</td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.inv-row').forEach((row) => {
        row.onclick = () => openForm(Number(row.getAttribute('data-id')));
      });
    }

    async function load() {
      tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-12 text-center text-slate-500">Loading…</td></tr>';
      try {
        allItems = await Api.inventory.list() || [];
        render();
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-12 text-center text-red-600">' + escapeHtml(e.message) + '</td></tr>';
      }
    }

    async function openForm(id) {
      let item = { name: '', sku: '', category: '', unit: 'pc', quantity: 0, reorderLevel: 5, unitPrice: 0 };
      if (id) {
        try { item = await Api.inventory.get(id); } catch (e) { alert(e.message); return; }
      }
      modalRoot.innerHTML = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target===this)window.closeModal()">
          <div class="bg-white rounded-xl w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-slate-900 mb-4">${id ? 'Edit' : 'Add'} item</h3>
            <div class="space-y-3">
              <label class="block text-sm text-slate-600">Name *<input id="inv_name" class="w-full border border-slate-200 rounded-lg p-2 mt-1" value="${escapeHtml(item.name || '')}"></label>
              <label class="block text-sm text-slate-600">SKU *<input id="inv_sku" class="w-full border border-slate-200 rounded-lg p-2 mt-1 font-mono text-sm" value="${escapeHtml(item.sku || '')}"></label>
              <label class="block text-sm text-slate-600">Category<input id="inv_cat" class="w-full border border-slate-200 rounded-lg p-2 mt-1" value="${escapeHtml(item.category || '')}" placeholder="e.g. Medicine, or SERVICE"></label>
              <div class="grid grid-cols-2 gap-3">
                <label class="block text-sm text-slate-600">Quantity<input id="inv_qty" type="number" class="w-full border border-slate-200 rounded-lg p-2 mt-1" value="${item.quantity ?? 0}"></label>
                <label class="block text-sm text-slate-600">Reorder at<input id="inv_reorder" type="number" class="w-full border border-slate-200 rounded-lg p-2 mt-1" value="${item.reorderLevel ?? 5}"></label>
              </div>
              <label class="block text-sm text-slate-600">Unit price (₱)<input id="inv_price" type="number" step="0.01" class="w-full border border-slate-200 rounded-lg p-2 mt-1" value="${item.unitPrice ?? 0}"></label>
              <div id="inv_photo_block" class="space-y-2">
                <label class="block text-sm text-slate-600">Product photo
                  <input id="inv_photo_file" type="file" accept="image/*" class="w-full border border-slate-200 rounded-lg p-2 mt-1 text-sm bg-white"/>
                </label>
                <p class="text-xs text-slate-400">Shown in inventory and billing checkout.</p>
                <div id="inv_photo_preview" class="flex items-center gap-3">
                  ${
                    item.photo && !isService(item)
                      ? itemPhotoHtml(item, "w-16 h-16")
                      : `<div class="w-16 h-16 rounded-lg border border-dashed border-slate-200 bg-slate-50 flex items-center justify-center text-slate-400 text-xs">No photo</div>`
                  }
                </div>
              </div>
            </div>
            <div class="mt-6 flex justify-between gap-2">
              ${id ? `<button type="button" id="inv_delete" class="px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg">Delete</button>` : '<span></span>'}
              <div class="flex gap-2">
                <button type="button" class="px-4 py-2 border border-slate-200 rounded-lg text-sm" onclick="window.closeModal()">Cancel</button>
                <button type="button" id="inv_save" class="px-4 py-2 rounded-lg bg-[var(--soft-teal)] text-white text-sm font-semibold">Save</button>
              </div>
            </div>
          </div>
        </div>`;
      const photoBlock = document.getElementById('inv_photo_block');
      const catInp = document.getElementById('inv_cat');
      function syncPhotoVisibility() {
        const svc = (catInp.value || '').trim().toUpperCase() === 'SERVICE';
        if (photoBlock) photoBlock.classList.toggle('hidden', svc);
      }
      catInp.addEventListener('input', syncPhotoVisibility);
      syncPhotoVisibility();

      const fileInp = document.getElementById('inv_photo_file');
      const previewEl = document.getElementById('inv_photo_preview');
      if (fileInp && previewEl) {
        fileInp.addEventListener('change', () => {
          const file = fileInp.files && fileInp.files[0];
          if (!file) return;
          const url = URL.createObjectURL(file);
          previewEl.innerHTML = `<img src="${url}" alt="" class="w-16 h-16 rounded-lg object-cover border border-slate-200"/>`;
        });
      }

      if (id) {
        document.getElementById('inv_delete').onclick = async () => {
          if (!confirm('Remove this item from inventory?')) return;
          try {
            await Api.inventory.remove(id);
            window.closeModal();
            await load();
          } catch (e) { alert(e.message); }
        };
      }

      document.getElementById('inv_save').onclick = async () => {
        const body = {
          id: item.id,
          sku: document.getElementById('inv_sku').value.trim(),
          name: (typeof window.bayportCapWords === 'function' ? window.bayportCapWords : (s)=>s)(document.getElementById('inv_name').value.trim()),
          category: document.getElementById('inv_cat').value.trim(),
          unit: item.unit || 'pc',
          quantity: parseInt(document.getElementById('inv_qty').value, 10) || 0,
          reorderLevel: parseInt(document.getElementById('inv_reorder').value, 10) || 0,
          unitPrice: parseFloat(document.getElementById('inv_price').value) || 0,
        };
        if (!body.sku || !body.name) { alert('Name and SKU are required'); return; }
        const isSvc = (body.category || '').toUpperCase() === 'SERVICE';
        try {
          let savedId;
          if (id) {
            const updated = await Api.inventory.update({ ...body, id });
            savedId = updated.id;
          } else {
            const created = await Api.inventory.create(body);
            savedId = created.id;
          }
          const fileInp = document.getElementById('inv_photo_file');
          const file = fileInp && fileInp.files && fileInp.files[0];
          if (file && savedId && !isSvc) {
            try { await Api.inventory.uploadPhoto(savedId, file); } catch (up) { alert(up.message || 'Photo upload failed'); }
          }
          window.closeModal();
          await load();
        } catch (e) { alert(e.message); }
      };
    }

    document.getElementById('addBtn').onclick = () => openForm(null);
    document.getElementById('invTabProducts').onclick = () => setInvTab('products');
    document.getElementById('invTabServices').onclick = () => setInvTab('services');
    invSearch.addEventListener('input', () => render());

    document.getElementById('lowStockToggle').onclick = () => {
      lowStockExpanded = !lowStockExpanded;
      updateLowStockPanel();
    };

    document.getElementById('mergeCatalogBtn').onclick = async () => {
      if (!confirm('Add missing default products and clinic services? Existing SKUs are skipped.')) return;
      try {
        const r = await Api.inventory.mergeCatalog();
        alert(`Catalog updated — ${r.rowsAddedThisRun} new item(s).`);
        await load();
      } catch (e) {
        alert(e.message || 'Could not load catalog');
      }
    };

    setInvTab('products');
    load();
  </script>
</body>
</html>
