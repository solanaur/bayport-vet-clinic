<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calendar View - Reminders</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <h1 class="text-3xl font-bold mb-6">Reminder Calendar</h1>
  <p class="mb-4 text-sm text-gray-600">
    <a href="reminders-calendar.html" class="text-blue-700 hover:underline">Open full calendar view</a>
    · <a href="reminders.html" class="text-blue-700 hover:underline">Back to reminders</a>
  </p>

  <div id="calendarError" class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"></div>
  <div id="calendar" class="grid grid-cols-7 gap-2"></div>

  <script src="assets/deploy-env.js"></script>
  <script>window.USE_API = true;</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>

  <script>
    if (typeof ensureLoggedIn === "function") ensureLoggedIn();

    function reminderSnippet(reminder) {
      const text = String(reminder?.message || reminder?.title || reminder?.type || "Reminder");
      return text.length > 20 ? text.substring(0, 20) + "…" : text;
    }

    async function loadCalendar() {
      const container = document.getElementById("calendar");
      const errorEl = document.getElementById("calendarError");
      try {
        const reminders = await Api.reminders.list();
        const days = Array.from({ length: 30 }, (_, i) => i + 1);

        container.innerHTML = days.map(day => {
          const hits = reminders.filter(r => Number(r.date?.split("-")[2]) === day);
          return `
            <div class="bg-white shadow p-3 rounded-md min-h-[100px]">
              <div class="font-semibold">${day}</div>
              <div class="text-sm text-gray-500">
                ${hits.map(h => `<div>${(h.type || "Reminder")}: ${reminderSnippet(h)}</div>`).join("")}
              </div>
            </div>`;
        }).join("");
      } catch (err) {
        container.innerHTML = "";
        errorEl.textContent = err?.message || "Unable to load reminders.";
        errorEl.classList.remove("hidden");
      }
    }

    loadCalendar();
  </script>
</body>
</html>
