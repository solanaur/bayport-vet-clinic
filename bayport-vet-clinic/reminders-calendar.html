<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reminders Calendar - Bayport</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js'></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/bayport-design.css">

<style>
  :root { --soft-teal:#0F5CC0; --bp-primary:#0F5CC0; }
</style>
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bp-bg);">
<header id="bpAppHeader"></header>

<div class="flex flex-1 min-h-0">
  <aside class="w-64 lg:w-72 bg-white border-r border-[#E5E7EB] p-5 shrink-0 hidden md:block">
    <nav id="sidebarNav" class="flex flex-col gap-1"></nav>
  </aside>

  <main class="flex-1 p-5 lg:p-8 min-w-0 overflow-y-auto">
    <h1 class="bp-page-title mb-5">Reminders Calendar</h1>
    <div id='calendar'></div>
  </main>
</div>

<script src="assets/deploy-env.js"></script>

<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script src="assets/app-header.js"></script>
<script src="assets/reminder-templates.js"></script>
<script>
// Use the same permissions as the main reminders page
guard("reminders");
if (typeof initBayportAppHeader === "function") {
  initBayportAppHeader(document.getElementById("bpAppHeader"), { accent: "soft-teal", tagline: "Reminders calendar" });
}
renderSidebar(document.getElementById("sidebarNav"), getRole(), "reminders-calendar.html");

document.addEventListener('DOMContentLoaded', async function() {
    try{
      const reminders = await Api.reminders.list();
      const sent = (reminders || []).filter(r => r.sent && r.date);

      const events = sent.map(r => ({
        title: (r.petName || r.ownerName || 'General').toString().substring(0, 22),
        start: r.date,
        backgroundColor: "#0F5CC0",
        textColor: "white",
        borderColor: "#0F5CC0",
        extendedProps: r
      }));

      const calendarEl = document.getElementById('calendar');
      if (typeof FullCalendar === 'undefined' || !calendarEl) {
        console.warn('FullCalendar not available or calendar element missing; skipping sent-emails calendar render.');
        return;
      }
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        fixedWeekCount: false,
        height: 800,
        eventDisplay: "block",
        events,
        eventClick: function(info) {
          const r = info.event.extendedProps;
          alert(
            `Reminder\n\n` +
            `For: ${r.petName || r.ownerName || "General reminder"}\n` +
            `Message: ${r.message}\n` +
            `Date: ${r.date}`
          );
        }
      });

      calendar.render();
    }catch(err){
      console.error('Failed to load sent reminders for calendar', err);
      alert('Unable to load sent reminders calendar. Please try again later.');
    }
});
</script>

</body>
</html>
