<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet Profile - Bayport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif}.shadow-soft{box-shadow:0 4px 16px rgba(0,0,0,.06)}:root{--soft-teal:#0057b8}
    .pp-card{background:#fff;border:1px solid #e5e7eb;border-radius:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .pp-card-h{padding:1.25rem 1.5rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:.5rem}
    .pp-card-b{padding:1.25rem 1.5rem}
  </style>
</head>
<body class="bg-[#eceff4] min-h-screen flex flex-col">
  <header id="bpAppHeader"></header>
  <div id="bpPetContext" class="hidden"></div>

  <div class="flex flex-1">
    <aside class="w-72 bg-white border-r border-gray-200 p-6 shadow-soft">
      <h2 class="text-xl font-semibold text-[var(--soft-teal)] uppercase mb-4">Pet Profile</h2>
      <nav id="sidebarNav" class="flex flex-col space-y-2"></nav>
    </aside>

    <main class="flex-1 p-6 lg:p-8 pb-16 bg-[#eceff4]">
      <div id="profileCard" class="max-w-[1400px] mx-auto space-y-6"></div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none max-w-sm"></div>

  <script src="assets/deploy-env.js"></script>
<script>window.USE_API=true;</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/app-header.js"></script>
  <script src="assets/pet-context.js"></script>
  <script>
    guard('pet-records');
    if (typeof initBayportAppHeader === "function") initBayportAppHeader(document.getElementById("bpAppHeader"), { accent: "soft-teal" });
    renderSidebar(document.getElementById('sidebarNav'), getRole(), 'pet-records.html');

    const id=Number(new URLSearchParams(location.search).get('id'));
    const modalRoot = document.getElementById('modalRoot');
    const toastRoot = document.getElementById('toastRoot');
    window.showToast = function (msg) {
      if (!toastRoot) return;
      const el = document.createElement('div');
      el.className = 'pointer-events-auto rounded-lg border border-gray-200 bg-white px-4 py-3 text-sm text-gray-800 shadow-lg';
      el.textContent = msg;
      toastRoot.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    };
    window.closeModal = () => { modalRoot.innerHTML = ''; };
    function row(label,val){return `<div><div class="text-sm text-gray-500">${label}</div><div class="font-medium">${val||''}</div></div>`;}
    function ppRow(lbl, val) {
      const v = val != null && String(val).trim() !== '' ? String(val).replace(/&/g, '&amp;').replace(/</g, '&lt;') : '—';
      return `<div class="flex justify-between gap-4 py-2.5 border-b border-gray-100 last:border-0 text-sm"><span class="text-gray-500 shrink-0">${lbl}</span><span class="font-medium text-gray-900 text-right">${v}</span></div>`;
    }
    function ppShowCell(v) {
      if (v == null || String(v).trim() === '') return '—';
      return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }
    function petDobInputValue(p) {
      const v = p && p.dateOfBirth;
      if (!v) return '';
      if (typeof v === 'string') return v.slice(0, 10);
      if (Array.isArray(v) && v.length >= 3) {
        return `${v[0]}-${String(v[1]).padStart(2, '0')}-${String(v[2]).padStart(2, '0')}`;
      }
      return '';
    }
    function fmtPetDobDetail(v) {
      if (!v) return '';
      let s = '';
      if (typeof v === 'string') s = v.slice(0, 10);
      else if (Array.isArray(v) && v.length >= 3) {
        s = `${v[0]}-${String(v[1]).padStart(2, '0')}-${String(v[2]).padStart(2, '0')}`;
      } else return '';
      try {
        const d = new Date(s + 'T12:00:00');
        if (!Number.isNaN(d.getTime())) {
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
        }
      } catch (_) {}
      return s;
    }

    function escapeHtmlAttr(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    window.openEditPetProfile = async function openEditPetProfile() {
      const p = await repoGetPet(id);
      if (!p) {
        alert('Pet not found');
        return;
      }
      const speciesOpts = ['', 'Canine', 'Feline']
        .map((o) => `<option value="${o}" ${(p.species || '') === o ? 'selected' : ''}>${o || '—'}</option>`)
        .join('');
      const fedOpts = ['FCCI', 'FCPI', 'N/A']
        .map((o) => `<option value="${o}" ${(p.federation || 'N/A') === o ? 'selected' : ''}>${o}</option>`)
        .join('');
      modalRoot.innerHTML = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target===this) closeModal()">
          <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">Edit pet profile</h3>
            <div class="grid grid-cols-1 gap-4">
              <label class="text-sm text-gray-600">Pet name<input id="ep_name" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.name)}"></label>
              <label class="text-sm text-gray-600">Species<select id="ep_species" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${speciesOpts}</select></label>
              <label class="text-sm text-gray-600">Breed<input id="ep_breed" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.breed)}"></label>
              <div class="grid grid-cols-2 gap-4">
                <label class="text-sm text-gray-600">Gender<select id="ep_gender" class="w-full border border-gray-300 rounded-lg p-3 mt-1"><option>Female</option><option>Male</option></select></label>
                <label class="text-sm text-gray-600">Age<input id="ep_age" type="number" min="0" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${p.age != null ? escapeHtmlAttr(p.age) : ''}"></label>
              </div>
              <label class="text-sm text-gray-600">Color<input id="ep_color" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.color || '')}"></label>
              <label class="text-sm text-gray-600">Weight<input id="ep_weight" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.weight || '')}"></label>
              <label class="text-sm text-gray-600">Date of birth<input id="ep_dob" type="date" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(petDobInputValue(p))}"></label>
              <label class="text-sm text-gray-600">Federation<select id="ep_federation" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${fedOpts}</select></label>
              <label class="text-sm text-gray-600">Home address<textarea id="ep_address" rows="3" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${escapeHtmlAttr(p.address)}</textarea></label>
            </div>
            <p class="text-xs text-gray-500 mt-3">Owner is managed from pet records. Changes here update this pet only.</p>
            <div class="mt-6 flex justify-end gap-2">
              <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50" onclick="closeModal()">Cancel</button>
              <button type="button" id="ep_save_btn" class="px-5 py-2 rounded-lg bg-[var(--soft-teal)] text-white font-medium hover:brightness-105">Save changes</button>
            </div>
          </div>
        </div>`;
      const gSel = document.getElementById('ep_gender');
      if (gSel && p.gender) gSel.value = p.gender;
      document.getElementById('ep_save_btn').onclick = async () => {
        const name = document.getElementById('ep_name').value.trim();
        if (!name) {
          alert('Pet name is required');
          return;
        }
        const base = {
          name,
          species: document.getElementById('ep_species').value,
          breed: document.getElementById('ep_breed').value.trim(),
          gender: document.getElementById('ep_gender').value,
          age: Number(document.getElementById('ep_age').value || 0),
          color: (document.getElementById('ep_color').value || '').trim(),
          weight: (document.getElementById('ep_weight').value || '').trim(),
          dateOfBirth: (document.getElementById('ep_dob').value || '').trim() || null,
          microchip: p.microchip,
          federation: document.getElementById('ep_federation').value,
          address: document.getElementById('ep_address').value.trim(),
          owner: p.owner,
          ownerId: p.ownerId,
          photo: p.photo,
        };
        try {
          await repoUpdatePet({ ...base, id: Number(id), procedures: p.procedures || [] }, null);
          closeModal();
          showToast('Profile updated successfully');
          await renderProfile();
        } catch (e) {
          alert(e.message || 'Could not save changes');
        }
      };
    };

    async function renderProfile() {
      const p = await repoGetPet(id);
      currentPet = p;
      if (typeof initBayportPetContextBar === 'function') {
        initBayportPetContextBar(document.getElementById('bpPetContext'), p);
      }
      const nm = (p?.name || 'Unknown Pet').replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const species = (p?.species || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const heroPhoto =
        typeof renderPetPhotoHtml === 'function'
          ? renderPetPhotoHtml(p?.photo, 'w-52 h-52 md:w-56 md:h-56 shrink-0 rounded-2xl border border-gray-200 shadow-md overflow-hidden', 'object-cover w-full h-full')
          : `<div class="w-52 h-52 md:w-56 md:h-56 shrink-0 rounded-2xl border border-gray-200 bg-[var(--soft-teal)] shadow-md"></div>`;
      const iconPaw = '<svg class="h-5 w-5 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>';
      const iconUser = '<svg class="h-5 w-5 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>';
      const iconHeart = '<svg class="h-5 w-5 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>';
      const iconBell = '<svg class="h-5 w-5 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>';
      const iconSyringe = '<svg class="h-5 w-5 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>';
      const vacc = typeof resolvePetLastVaccination === 'function' ? resolvePetLastVaccination(p) : { date: '', place: '', vet: '', summary: '' };

      const frontDesk = typeof window.isFrontOffice === "function" && window.isFrontOffice(getRole());
      const consultBtn = frontDesk
        ? ""
        : `<button type="button" onclick="startConsultation()" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-[var(--soft-teal)] text-white text-sm font-semibold shadow-sm hover:brightness-105">Start consultation</button>`;

      document.getElementById('profileCard').innerHTML = `
        <div class="flex flex-wrap items-center justify-between gap-3">
          <a href="pet-records.html" class="inline-flex items-center gap-1.5 text-sm font-semibold text-[var(--soft-teal)] hover:underline">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            All pet profiles
          </a>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="openEditPetProfile()" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium text-gray-800 bg-white hover:bg-gray-50 shadow-sm">Edit profile</button>
            ${consultBtn}
          </div>
        </div>

        <div class="pp-card overflow-hidden">
          <div class="pp-card-b !pt-6 !pb-6">
            <div class="flex flex-col sm:flex-row gap-6 flex-1 min-w-0">
                ${heroPhoto}
                <div class="flex-1 min-w-0 space-y-4">
                  <div class="flex flex-wrap items-center gap-3">
                    <h2 class="text-3xl font-bold text-gray-900 tracking-tight">${nm}</h2>
                    ${species ? `<span class="inline-flex items-center rounded-full bg-sky-100 text-sky-800 px-3 py-0.5 text-xs font-semibold">${species}</span>` : ''}
                  </div>
                  <div class="grid grid-cols-2 sm:grid-cols-3 gap-x-6 gap-y-3 text-sm">
                    <div><div class="text-gray-500">Breed</div><div class="font-semibold text-gray-900">${ppShowCell(p?.breed)}</div></div>
                    <div><div class="text-gray-500">Gender</div><div class="font-semibold text-gray-900">${ppShowCell(p?.gender)}</div></div>
                    <div><div class="text-gray-500">Age</div><div class="font-semibold text-gray-900">${ppShowCell(p?.age)}</div></div>
                    <div><div class="text-gray-500">Microchip ID</div><div class="font-semibold text-gray-900">${ppShowCell(p?.microchipId ?? p?.microchip)}</div></div>
                    <div><div class="text-gray-500">Color</div><div class="font-semibold text-gray-900">${ppShowCell(p?.color)}</div></div>
                    <div><div class="text-gray-500">Weight</div><div class="font-semibold text-gray-900">${ppShowCell(p?.weight)}</div></div>
                    <div><div class="text-gray-500">Last vaccination</div><div class="font-semibold text-gray-900">${ppShowCell(vacc.date)}</div></div>
                    <div class="sm:col-span-2"><div class="text-gray-500">Place last vaccinated</div><div class="font-semibold text-gray-900">${ppShowCell(vacc.place)}</div></div>
                    <div><div class="text-gray-500">Vaccinating veterinarian</div><div class="font-semibold text-gray-900">${ppShowCell(vacc.vet)}</div></div>
                  </div>
                </div>
            </div>
          </div>
        </div>`;

      const vaccBlock = `
        <div class="pp-card" id="petVaccinationSection">
          <div class="pp-card-h">${iconSyringe}<span class="font-semibold text-gray-800">Last vaccination</span></div>
          <div class="pp-card-b space-y-0">
            ${ppRow('Date', vacc.date)}
            ${ppRow('Place vaccinated', vacc.place)}
            ${ppRow('Veterinarian', vacc.vet)}
          </div>
        </div>`;

      const detailBlock = `
        <div class="pp-card" id="petDetailsSection">
          <div class="pp-card-h">${iconPaw}<span class="font-semibold text-gray-800">Pet details</span></div>
          <div class="pp-card-b space-y-0">
            ${ppRow('Species', p?.species)}
            ${ppRow('Breed', p?.breed)}
            ${ppRow('Gender', p?.gender)}
            ${ppRow('Age', p?.age)}
            ${ppRow('Date of birth', fmtPetDobDetail(p?.dateOfBirth))}
            ${ppRow('Color', p?.color)}
            ${ppRow('Microchip ID', p?.microchipId ?? p?.microchip)}
            ${ppRow('Weight', p?.weight)}
            ${ppRow('Last vaccination date', vacc.date)}
            ${ppRow('Place last vaccinated', vacc.place)}
            ${ppRow('Vaccinating veterinarian', vacc.vet)}
            ${ppRow('Federation', p?.federation || 'N/A')}
          </div>
        </div>`;

      const ownerShell = `
        <div class="pp-card">
          <div class="pp-card-h">${iconUser}<span class="font-semibold text-gray-800">Owner information</span></div>
          <div class="pp-card-b space-y-3 text-sm" id="ownerCard"><div class="text-gray-500">Loading owner...</div></div>
        </div>`;

      const medBlock = `
        <div class="pp-card" id="medSection">
          <div class="pp-card-h">${iconHeart}<span class="font-semibold text-gray-800">Medical history</span></div>
          <div class="pp-card-b">
            <div class="overflow-x-auto -mx-1">
              <table class="w-full border-collapse text-sm min-w-[480px]">
                <thead><tr class="text-left text-gray-500 border-b border-gray-200">
                  <th class="py-2 pr-3 font-medium">Date</th>
                  <th class="py-2 pr-3 font-medium">Visit reason / Diagnosis</th>
                  <th class="py-2 font-medium">Provider</th>
                </tr></thead>
                <tbody id="procRows"></tbody>
                <tbody id="procRowsExtra" class="hidden"></tbody>
              </table>
            </div>
            <div class="mt-3">
              <button type="button" id="medHistoryViewAll" class="hidden text-sm font-semibold text-[var(--soft-teal)] hover:underline">View all history</button>
            </div>
          </div>
        </div>`;

      const remBlock = `
        <div class="pp-card" id="remSection">
          <div class="pp-card-h flex-wrap gap-2">
            ${iconBell}<span class="font-semibold text-gray-800 flex-1">Reminders</span>
            <button type="button" class="text-xs font-semibold rounded-md border border-[var(--soft-teal)] text-[var(--soft-teal)] px-2.5 py-1 hover:bg-[var(--soft-teal)] hover:text-white bg-white" onclick="openPetReminderModal();">+ Add</button>
          </div>
          <div class="pp-card-b">
            <div id="petReminderList" class="overflow-x-auto -mx-1">
              <div class="text-sm text-gray-500 px-1">Loading reminders...</div>
            </div>
            <div class="mt-3"><a href="#remSection" class="text-[var(--soft-teal)] text-sm font-semibold hover:underline">View all reminders</a></div>
          </div>
        </div>`;

      document.getElementById('profileCard').insertAdjacentHTML('beforeend', `
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
          <div class="xl:col-span-5 space-y-6">${vaccBlock}${detailBlock}</div>
          <div class="xl:col-span-7 space-y-6">${ownerShell}${medBlock}${remBlock}</div>
        </div>`);

      // Owner card render
      (async () => {
        const el = document.getElementById('ownerCard');
        let ownerName = p?.owner || '';
        let phone = '';
        let email = '';
        let address = '';
        if (p?.ownerId) {
          const o = await repoGetOwner(p.ownerId);
          if (o) {
            ownerName = o.fullName;
            phone = o.phone;
            email = o.email;
            address = o.address;
          }
        }
        const esc = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const rowO = (lbl, val) =>
          `<div class="flex justify-between gap-4 py-2.5 border-b border-gray-100 text-sm"><span class="text-gray-500 shrink-0">${lbl}</span><span class="font-medium text-gray-900 text-right">${val ? esc(val) : '—'}</span></div>`;
        el.innerHTML = ownerName
          ? `${rowO('Owner', ownerName)}${rowO('Phone', phone)}${rowO('Email', email)}${rowO('Address', address)}<div class="flex justify-between items-center gap-3 pt-2.5 text-sm"><span class="text-gray-500">Primary contact</span><span class="text-xs font-semibold rounded-full bg-emerald-100 text-emerald-800 px-2.5 py-0.5">Yes</span></div>`
          : `<div class="text-gray-500">No owner linked.</div>`;
      })();

      await renderProcedures();
      await renderPetReminders();
    }

    function procCellEsc(s) {
      if (s == null || String(s).trim() === '') return '—';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }
    function procFmtDate(d) {
      if (!d) return '—';
      try {
        const x = new Date(d);
        if (Number.isNaN(x.getTime())) return procCellEsc(String(d));
        return x.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (_) {
        return procCellEsc(String(d));
      }
    }
    function procVisitLine(pr) {
      const bits = [pr.name, pr.category, pr.notes].filter((x) => x && String(x).trim());
      return procCellEsc(bits.join(' · ') || '');
    }

    async function renderProcedures(){
      try {
        const p = await repoGetPet(id);
        const list = (p?.procedures||[]);
        const tbody = document.getElementById('procRows');
        const extraTb = document.getElementById('procRowsExtra');
        const btn = document.getElementById('medHistoryViewAll');
        if(!tbody) return;
        const sorted = [...list].sort((a, b) => String(b.performedAt || "").localeCompare(String(a.performedAt || "")));
        const first = sorted.slice(0, 4);
        const rest = sorted.slice(4);
        const rowHtml = (pr) => `
          <tr class="border-b border-gray-100">
            <td class="py-3 pr-3 align-top text-gray-900 whitespace-nowrap">${procFmtDate(pr.performedAt)}</td>
            <td class="py-3 pr-3 align-top text-gray-800">${procVisitLine(pr)}</td>
            <td class="py-3 align-top text-gray-700">${procCellEsc(pr.vet || '')}</td>
          </tr>`;
        tbody.innerHTML =
          first.map(rowHtml).join('') ||
          `<tr><td class="py-6 text-center text-gray-500" colspan="3">No medical history recorded.</td></tr>`;
        if (extraTb) {
          extraTb.innerHTML = rest.map(rowHtml).join('');
          extraTb.classList.add('hidden');
        }
        if (btn) {
          if (rest.length > 0) {
            btn.classList.remove('hidden');
            btn.textContent = `View all history (${rest.length} more)`;
            btn.onclick = () => {
              extraTb?.classList.remove('hidden');
              btn.classList.add('hidden');
            };
          } else {
            btn.classList.add('hidden');
            btn.onclick = null;
          }
        }
      } catch (err) {
        console.error(err);
      }
    }

    function startConsultation(){
      sessionStorage.setItem('consultationPetId', id);
      location.href = `consultations.html?petId=${id}`;
    }

    function openProc(editIndex){

async function renderPetReminders(){
  const container = document.getElementById('petReminderList');
  if(!container) return;
  try{
    const list = await Api.reminders.listByPet(id);
    petRemindersCache = Array.isArray(list) ? list : [];
    if (!petRemindersCache.length) {
      container.innerHTML = `<div class="text-sm text-gray-500 border border-dashed border-gray-200 rounded-lg p-4 mx-1">No reminders yet for this pet.</div>`;
      return;
    }
    function remEsc(s) {
      if (s == null || String(s).trim() === '') return '—';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }
    function remTypeLabel(r) {
      const t = cleanDisplayText(extractSubject(r.message || ''));
      return remEsc(t.length > 48 ? t.slice(0, 45) + '…' : t);
    }
    function remDetailsPreview(r) {
      const body = (r.message || '').replace(/^Subject:.*$/im, '').trim() || r.message || '';
      const line = body.split('\n').find((l) => l.trim()) || '';
      const short = line.length > 80 ? line.slice(0, 77) + '…' : line;
      return remEsc(short);
    }
    function remDue(r) {
      return r.date ? remEsc(new Date(r.date).toLocaleDateString()) : '—';
    }
    function remStatusBadge(r) {
      return r.sent
        ? `<span class="inline-flex text-xs font-semibold rounded-full bg-emerald-100 text-emerald-800 px-2.5 py-0.5">Sent</span>`
        : `<span class="inline-flex text-xs font-semibold rounded-full bg-sky-100 text-sky-800 px-2.5 py-0.5">Pending</span>`;
    }
    const rows = petRemindersCache
      .map(
        (r) => `<tr class="border-b border-gray-100">
      <td class="py-3 pr-3 align-top font-medium text-gray-900">${remTypeLabel(r)}</td>
      <td class="py-3 pr-3 align-top text-gray-600 text-sm">${remDetailsPreview(r)}</td>

        <button type="button" class="text-xs font-semibold text-red-600 hover:underline" onclick="deleteReminder(${r.id})">Delete</button>

      )
      .join('');

      <thead><tr class="text-left text-gray-500 border-b border-gray-200">

        <th class="py-2 pr-3 font-medium">Status</th>
        <th class="py-2 font-medium text-right">Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }catch(err){
    console.error(err);
    container.innerHTML = `<div class="text-sm text-red-600">Unable to load reminders: ${err.message}</div>`;
  }
}

function cleanDisplayText(text) {
  if (!text) return text;
  return text.replace(/\{\{[^}]+\}\}/g, '').trim();
}

function extractSubject(message) {
  if (!message) return 'REMINDER';
  const lines = message.split('\n');
  for (let line of lines) {
    line = line.trim();
    if (line.startsWith('Subject:')) {
      const subject = line.replace(/^Subject:\s*/i, '').trim();
      return cleanDisplayText(subject) || 'REMINDER';
    }
  }
  const firstLine = lines[0].trim();
  if (firstLine.length > 0 && firstLine.length < 60) {
    return cleanDisplayText(firstLine).toUpperCase() || 'REMINDER';
  }
  if (message.includes('Vaccination') || message.includes('vaccination')) return 'VACCINATION REMINDER';
  if (message.includes('Follow-up') || message.includes('Follow-Up') || message.includes('follow-up')) return 'FOLLOW UP REMINDER';
  if (message.includes('Deworming') || message.includes('deworming')) return 'DEWORMING REMINDER';
  if (message.includes('Annual') || message.includes('annual')) return 'ANNUAL CHECKUP REMINDER';
  if (message.includes('Appointment') || message.includes('appointment')) return 'APPOINTMENT REMINDER';
  if (message.includes('Surgery') || message.includes('surgery')) return 'POST-SURGERY REMINDER';
  if (message.includes('Dental') || message.includes('dental')) return 'DENTAL CLEANING REMINDER';
  if (message.includes('Grooming') || message.includes('grooming')) return 'GROOMING REMINDER';
  if (message.includes('Boarding') || message.includes('boarding')) return 'BOARDING REMINDER';
  if (message.includes('Prescription') || message.includes('prescription')) return 'PRESCRIPTION REMINDER';
  if (message.includes('Lab') || message.includes('Test Results')) return 'LAB TEST RESULTS';
  return 'REMINDER';
}

async function sendReminderEmail(reminderId){
  const templateSelect = document.getElementById('petReminderEmailTemplate');
  const subjectInput = document.getElementById('petReminderEmailSubject');
  const previewInput = document.getElementById('petReminderEmailPreview');
  const reminder = petRemindersCache.find(r=>r.id===reminderId);
  if(!reminder){
    alert('Reminder not found.');
    return;
  }
  if (typeof navigator !== 'undefined' && navigator.onLine === false) {
    alert('No Internet Connection.');
    return;
  }
  const templateBody = (() => {
    const selectedId = templateSelect?.value;
    if(!selectedId) return previewInput.value;
    const templates = templateCache[(reminder.type||'PET').toUpperCase()] || [];
    const selected = templates.find(t=>String(t.id)===selectedId);
    return selected?.body || previewInput.value;
  })();
  try{
    await Api.reminders.sendEmail(reminderId, {
      template: templateBody,
      subject: subjectInput.value || 'Bayport Reminder'
    });
    alert('Email sent!');
    closeModal();
    renderPetReminders();
  }catch(err){
    alert('Failed to send email: '+err.message);
  }
}

  try{
    await Api.reminders.remove(reminderId);

async function getTemplates(type){
  const key = (type || 'PET').toUpperCase();
  if(!templateCache[key]){
    try{
      templateCache[key] = await Api.email.templates.list(key);
    }catch(err){
      console.warn('Could not load templates from backend, falling back to built-in defaults.', err);
      const all = (window.REMINDER_TEMPLATES || []).map(t => ({
        id: t.id,
        subject: t.subject,
        body: t.template
      }));
      if (key === 'PET') {
        templateCache[key] = all.filter(t => t.id !== 'general');
      } else {
        templateCache[key] = all.filter(t => t.id === 'general');
      }
    }
  }
  return templateCache[key];
}
