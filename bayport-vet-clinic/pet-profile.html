<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet Profile - Bayport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/bayport-design.css">
  <style>
    :root { --soft-teal: #0F5CC0; --bp-primary: #0F5CC0; }
    .pp-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; box-shadow: 0 1px 2px rgba(16,24,40,0.06); }
    .pp-card-h { padding: 1rem 1.25rem; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; gap: .5rem; font-weight: 600; font-size: 14px; }
    .pp-card-b { padding: 1rem 1.25rem; }
    .visit-history-head {
      display: none;
      grid-template-columns: minmax(6.5rem, 7.5rem) minmax(8rem, 1.35fr) minmax(5rem, 1fr) 2rem;
      gap: 12px;
      padding: 0 14px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #94A3B8;
    }
    @media (min-width: 640px) {
      .visit-history-head.has-rows { display: grid; }
    }
    .visit-accordion {
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .visit-accordion + .visit-accordion { margin-top: 8px; }
    .visit-accordion-header {
      display: flex;
      align-items: stretch;
      gap: 8px;
      width: 100%;
      text-align: left;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    .visit-accordion-header:hover .visit-accordion-summary { background: #F9FAFB; }
    .visit-accordion-header.is-open .visit-accordion-summary { background: #F0F7FF; border-bottom: 1px solid #E5E7EB; }
    .visit-accordion-summary {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(6.5rem, 7.5rem) minmax(8rem, 1.35fr) minmax(5rem, 1fr);
      gap: 12px;
      align-items: center;
      padding: 12px 0 12px 14px;
      min-width: 0;
      transition: background .15s ease;
    }
    @media (max-width: 639px) {
      .visit-accordion-summary {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 12px 0 12px 14px;
      }
      .visit-accordion-summary .visit-col-diagnosis .dx-lbl { display: inline; }
    }
    .visit-col-date { font-weight: 600; color: #111827; white-space: nowrap; font-size: 13px; }
    .visit-col-type { color: #374151; font-weight: 500; font-size: 13px; }
    .visit-col-diagnosis { color: #4B5563; font-size: 13px; }
    .visit-col-diagnosis .dx-lbl { color: #94A3B8; font-weight: 500; }
    .visit-chevron-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      flex-shrink: 0;
      color: #94A3B8;
    }
    .visit-chevron { transition: transform .25s ease; }
    .visit-accordion-header.is-open .visit-chevron { transform: rotate(180deg); color: var(--soft-teal); }
    .visit-accordion-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .25s ease;
    }
    .visit-accordion-panel.is-open { grid-template-rows: 1fr; }
    .visit-accordion-panel-inner { overflow: hidden; min-height: 0; }
    .visit-accordion-body {
      padding: 12px 14px 14px;
      background: #FAFBFC;
      font-size: 13px;
      color: #374151;
      line-height: 1.45;
    }
    .visit-expand-block + .visit-expand-block {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid #EEF2F6;
    }
    .visit-expand-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748B;
      margin-bottom: 10px;
    }
    .visit-kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
    }
    @media (max-width: 640px) {
      .visit-kv-grid { grid-template-columns: 1fr; gap: 8px; }
    }
    .visit-kv { min-width: 0; }
    .visit-kv .k { font-size: 11px; color: #94A3B8; font-weight: 500; margin-bottom: 2px; }
    .visit-kv .v { color: #111827; font-weight: 500; word-break: break-word; }
    .visit-kv .v.notes { font-weight: 400; white-space: pre-wrap; }
    .visit-compact-list { margin: 0; padding: 0; list-style: none; }
    .visit-compact-list li {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 0;
      font-size: 13px;
    }
    .visit-compact-list li + li { border-top: 1px solid #F1F5F9; }
    .visit-compact-list .sub { font-size: 11px; color: #64748B; margin-top: 2px; font-weight: 400; }
    .visit-sub-lbl {
      font-size: 11px;
      font-weight: 600;
      color: #64748B;
      margin: 10px 0 4px;
    }
    .visit-sub-lbl:first-child { margin-top: 0; }
    .visit-attach-list { margin: 0; padding: 0; list-style: none; }
    .visit-attach-list li { padding: 4px 0; }
    .visit-attach-list a {
      color: var(--soft-teal);
      font-weight: 600;
      font-size: 12px;
      text-decoration: none;
    }
    .visit-attach-list a:hover { text-decoration: underline; }
    .visit-actions {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #EEF2F6;
    }
    .pet-reminders-head {
      display: none;
      grid-template-columns: minmax(7rem, 1.4fr) minmax(5.5rem, 6.5rem) minmax(4.5rem, 5.5rem) auto;
      gap: 12px;
      padding: 0 14px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #94A3B8;
    }
    @media (min-width: 640px) {
      .pet-reminders-head.has-rows { display: grid; }
    }
    .pet-reminder-row {
      display: grid;
      grid-template-columns: minmax(7rem, 1.4fr) minmax(5.5rem, 6.5rem) minmax(4.5rem, 5.5rem) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
    }
    .pet-reminder-row + .pet-reminder-row { margin-top: 8px; }
    @media (max-width: 639px) {
      .pet-reminder-row {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "type actions"
          "due actions"
          "status actions";
        gap: 6px 10px;
      }
      .pet-rem-col-type { grid-area: type; }
      .pet-rem-col-due { grid-area: due; font-size: 12px; color: #6B7280; }
      .pet-rem-col-status { grid-area: status; }
      .pet-rem-col-actions { grid-area: actions; align-self: center; }
    }
    .pet-rem-col-type { font-weight: 600; color: #111827; min-width: 0; }
    .pet-rem-col-type .sub { font-size: 11px; font-weight: 400; color: #94A3B8; margin-top: 2px; }
    .pet-rem-col-due { color: #374151; font-weight: 500; white-space: nowrap; }
    .pet-rem-col-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .pet-rem-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #E5E7EB;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s ease, color .12s ease;
    }
    .pet-rem-btn:hover { background: #F9FAFB; }
    .pet-rem-btn--send { border-color: #0F5CC0; color: #0F5CC0; }
    .pet-rem-btn--send:hover { background: #F3F8FF; }
    .pet-rem-btn--send:disabled { opacity: .45; cursor: not-allowed; }
    .pet-rem-btn--delete { border-color: transparent; color: #B42318; }
    .pet-rem-btn--delete:hover { background: #FEF2F2; }
    .pet-rem-badge {
      display: inline-flex;
      font-size: 11px;
      font-weight: 600;
      border-radius: 999px;
      padding: 2px 8px;
    }
    .pet-rem-badge--sent { background: #ECFDF5; color: #047857; }
    .pet-rem-badge--pending { background: #EFF6FF; color: #1D4ED8; }
    .ext-rec-empty {
      text-align: center;
      padding: 32px 24px;
      border-radius: 8px;
      background: #F8FAFC;
    }
    .ext-rec-empty-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #E5E7EB;
      color: #94A3B8;
    }
    .ext-rec-empty-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 8px;
    }
    .ext-rec-empty-desc {
      font-size: 13px;
      line-height: 1.5;
      color: #6B7280;
      max-width: 32rem;
      margin: 0 auto 18px;
    }
    .ext-rec-add-btn {
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--soft-teal);
      background: var(--soft-teal);
      color: #fff;
      cursor: pointer;
      transition: filter .12s ease;
    }
    .ext-rec-add-btn:hover { filter: brightness(1.05); }
    .ext-rec-timeline { display: flex; flex-direction: column; gap: 8px; }
    .ext-rec-accordion {
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .ext-rec-header {
      display: flex;
      align-items: stretch;
      gap: 8px;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }
    .ext-rec-header:hover .ext-rec-summary { background: #F9FAFB; }
    .ext-rec-header.is-open .ext-rec-summary { background: #F0F7FF; border-bottom: 1px solid #E5E7EB; }
    .ext-rec-summary {
      flex: 1;
      min-width: 0;
      padding: 12px 0 12px 14px;
      transition: background .15s ease;
    }
    .ext-rec-clinic {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 3px;
    }
    .ext-rec-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .ext-rec-date { font-size: 12px; color: #6B7280; font-weight: 500; }
    .ext-rec-chevron-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 0 12px;
      flex-shrink: 0;
      color: #94A3B8;
    }
    .ext-rec-toggle-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .ext-rec-chevron { transition: transform .25s ease; }
    .ext-rec-header.is-open .ext-rec-chevron { transform: rotate(180deg); color: var(--soft-teal); }
    .ext-rec-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .25s ease;
    }
    .ext-rec-panel.is-open { grid-template-rows: 1fr; }
    .ext-rec-panel-inner {
      overflow: hidden;
      min-height: 0;
      padding: 0 14px;
    }
    .ext-rec-panel.is-open .ext-rec-panel-inner {
      padding: 12px 14px 14px;
      background: #FAFBFC;
    }
    .ext-rec-kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
    }
    @media (max-width: 640px) {
      .ext-rec-kv-grid { grid-template-columns: 1fr; gap: 8px; }
    }
    .ext-kv { min-width: 0; }
    .ext-kv-k { font-size: 11px; color: #94A3B8; font-weight: 500; margin-bottom: 2px; }
    .ext-kv-v { color: #111827; font-weight: 500; font-size: 13px; word-break: break-word; }
    .ext-kv-v.notes { font-weight: 400; white-space: pre-wrap; }
    .ext-rec-attach { margin-top: 12px; padding-top: 12px; border-top: 1px solid #EEF2F6; }
    .ext-rec-attach-lbl { font-size: 11px; color: #94A3B8; font-weight: 500; margin-bottom: 4px; }
    .ext-rec-attach-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--soft-teal);
      text-decoration: none;
    }
    .ext-rec-attach-link:hover { text-decoration: underline; }
    .ext-rec-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #EEF2F6;
    }
    .ext-rec-action {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #E5E7EB;
      background: #fff;
      cursor: pointer;
    }
    .ext-rec-action--edit { border-color: var(--soft-teal); color: var(--soft-teal); }
    .ext-rec-action--edit:hover { background: #F0F7FF; }
    .ext-rec-action--delete { border-color: transparent; color: #B42318; }
    .ext-rec-action--delete:hover { background: #FEF2F2; }
  </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--bp-bg);">
  <header id="bpAppHeader"></header>

  <div class="flex flex-1 min-h-0">
    <aside class="w-64 lg:w-72 bg-white border-r border-gray-200 p-5 shrink-0 hidden md:block">
      <nav id="sidebarNav" class="flex flex-col gap-1"></nav>
    </aside>

    <main class="flex-1 p-5 lg:p-8 pb-16 min-w-0 overflow-y-auto">
      <div id="profileCard" class="max-w-[1400px] mx-auto space-y-5"></div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none max-w-sm"></div>

  <script src="assets/deploy-env.js"></script>
<script>window.USE_API=true;</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/app-header.js"></script>
  <script src="assets/medical-history.js"></script>
  <script>
    guard('pet-records');
    if (typeof initBayportAppHeader === "function") initBayportAppHeader(document.getElementById("bpAppHeader"), { accent: "soft-teal" });
    renderSidebar(document.getElementById('sidebarNav'), getRole(), 'pet-records.html');

    const id=Number(new URLSearchParams(location.search).get('id'));
    const modalRoot = document.getElementById('modalRoot');
    const toastRoot = document.getElementById('toastRoot');
    window.showToast = function (msg) {
      if (!toastRoot) return;
      const el = document.createElement('div');
      el.className = 'pointer-events-auto rounded-lg border border-gray-200 bg-white px-4 py-3 text-sm text-gray-800 shadow-lg';
      el.textContent = msg;
      toastRoot.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    };
    window.closeModal = () => { modalRoot.innerHTML = ''; };
    function row(label,val){return `<div><div class="text-sm text-gray-500">${label}</div><div class="font-medium">${val||''}</div></div>`;}
    function ppRow(lbl, val) {
      const v = val != null && String(val).trim() !== '' ? String(val).replace(/&/g, '&amp;').replace(/</g, '&lt;') : '—';
      return `<div class="flex justify-between gap-4 py-2.5 border-b border-gray-100 last:border-0 text-sm"><span class="text-gray-500 shrink-0">${lbl}</span><span class="font-medium text-gray-900 text-right">${v}</span></div>`;
    }
    function ppShowCell(v) {
      if (v == null || String(v).trim() === '') return '—';
      return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }
    function petDobInputValue(p) {
      const v = p && p.dateOfBirth;
      if (!v) return '';
      if (typeof v === 'string') return v.slice(0, 10);
      if (Array.isArray(v) && v.length >= 3) {
        return `${v[0]}-${String(v[1]).padStart(2, '0')}-${String(v[2]).padStart(2, '0')}`;
      }
      return '';
    }
    function petLastVaccInputValue(p) {
      const v = p && p.lastVaccinationDate;
      if (!v) return '';
      if (typeof v === 'string') return v.slice(0, 10);
      if (Array.isArray(v) && v.length >= 3) {
        return `${v[0]}-${String(v[1]).padStart(2, '0')}-${String(v[2]).padStart(2, '0')}`;
      }
      return '';
    }
    function fmtPetDobDetail(v) {
      if (!v) return '';
      let s = '';
      if (typeof v === 'string') s = v.slice(0, 10);
      else if (Array.isArray(v) && v.length >= 3) {
        s = `${v[0]}-${String(v[1]).padStart(2, '0')}-${String(v[2]).padStart(2, '0')}`;
      } else return '';
      try {
        const d = new Date(s + 'T12:00:00');
        if (!Number.isNaN(d.getTime())) {
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
        }
      } catch (_) {}
      return s;
    }

    function escapeHtmlAttr(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    window.openEditPetProfile = async function openEditPetProfile() {
      const p = await repoGetPet(id);
      if (!p) {
        alert('Pet not found');
        return;
      }
      const speciesOpts = ['', 'Canine', 'Feline']
        .map((o) => `<option value="${o}" ${(p.species || '') === o ? 'selected' : ''}>${o || '—'}</option>`)
        .join('');
      modalRoot.innerHTML = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target===this) closeModal()">
          <div class="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">Edit pet profile</h3>
            <div class="grid grid-cols-1 gap-4">
              <label class="text-sm text-gray-600">Pet name<input id="ep_name" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.name)}"></label>
              <label class="text-sm text-gray-600">Species<select id="ep_species" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${speciesOpts}</select></label>
              <label class="text-sm text-gray-600">Breed<input id="ep_breed" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.breed)}"></label>
              <div class="grid grid-cols-2 gap-4">
                <label class="text-sm text-gray-600">Gender<select id="ep_gender" class="w-full border border-gray-300 rounded-lg p-3 mt-1"><option>Female</option><option>Male</option></select></label>
                <label class="text-sm text-gray-600">Age<input id="ep_age" type="number" min="0" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${p.age != null ? escapeHtmlAttr(p.age) : ''}"></label>
              </div>
              <label class="text-sm text-gray-600">Color<input id="ep_color" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.color || '')}"></label>
              <label class="text-sm text-gray-600">Weight<input id="ep_weight" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.weight || '')}"></label>
              <label class="text-sm text-gray-600">Date of birth<input id="ep_dob" type="date" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(petDobInputValue(p))}"></label>
              <label class="text-sm text-gray-600">Home address<textarea id="ep_address" rows="3" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${escapeHtmlAttr(p.address)}</textarea></label>
              <div class="border border-sky-100 rounded-lg p-4 bg-sky-50/40 space-y-3">
                <p class="text-sm font-semibold text-[var(--soft-teal)]">Health profile &amp; last vaccination</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <label class="text-sm text-gray-600">Last vaccination date<input id="ep_lastVaccDate" type="date" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(petLastVaccInputValue(p))}"></label>
                  <label class="text-sm text-gray-600">Place vaccinated<input id="ep_lastVaccPlace" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.lastVaccinationPlace || '')}"></label>
                  <label class="text-sm text-gray-600">Veterinarian<input id="ep_lastVaccVet" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.lastVaccinationVet || '')}"></label>
                </div>
                <label class="text-sm text-gray-600">Known allergies<input id="ep_allergies" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.allergies || '')}" placeholder="e.g. chicken, penicillin"></label>
                <label class="text-sm text-gray-600">Chronic conditions<input id="ep_chronic" class="w-full border border-gray-300 rounded-lg p-3 mt-1" value="${escapeHtmlAttr(p.chronicConditions || '')}"></label>
                <label class="text-sm text-gray-600">Long-term medications<textarea id="ep_meds" rows="2" class="w-full border border-gray-300 rounded-lg p-3 mt-1">${escapeHtmlAttr(p.knownMedications || '')}</textarea></label>
              </div>
            </div>
            <p class="text-xs text-gray-500 mt-3">Use <strong>+ External record</strong> on the profile page to add full medical history sections. Changes here update this pet only.</p>
            <div class="mt-6 flex justify-end gap-2">
              <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50" onclick="closeModal()">Cancel</button>
              <button type="button" id="ep_save_btn" class="px-5 py-2 rounded-lg bg-[var(--soft-teal)] text-white font-medium hover:brightness-105">Save changes</button>
            </div>
          </div>
        </div>`;
      const gSel = document.getElementById('ep_gender');

    function procCellEsc(s) {
      if (s == null || String(s).trim() === '') return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }
    function procFmtDate(d) {
      if (!d) return '—';
      try {
        const x = new Date(String(d).slice(0, 10) + 'T12:00:00');
        if (Number.isNaN(x.getTime())) return procCellEsc(String(d));
        return x.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (_) {
        return procCellEsc(String(d));
      }
    }
    function extractDiagnosis(notes) {
      const text = String(notes || '');
      const m = text.match(/Diagnosis:\s*([^\n]+)/i);
      const val = m ? m[1].trim() : '';
      if (!val || val.toUpperCase() === 'N/A') return '';
      return val;
    }
    function extractClinicalNotes(notes) {
      const text = String(notes || '');
      const m = text.match(/Clinical Notes:\s*([\s\S]*)/i);
      if (m) {
        const body = m[1].trim();
        if (body && body.toUpperCase() !== 'N/A') return body;
        return '';
      }
      const stripped = text.replace(/^Diagnosis:[^\n]*\n?/i, '').trim();
      return stripped && stripped.toUpperCase() !== 'N/A' ? stripped : '';
    }
    function visitTypeLabel(pr) {
      const cat = String(pr?.category || '').trim();
      if (cat) return cat;
      const name = String(pr?.name || '').trim();
      return name || 'Visit';
    }
    function visitDiagnosisLabel(visit) {
      const d = visit.diagnosis || extractDiagnosis(visit.procedures?.[0]?.notes);
      if (!d) return '<span class="text-gray-400">—</span>';
      return `<span class="dx-lbl">Diagnosis: </span>${procCellEsc(d)}`;
    }
    function pesoVisit(n) {
      const num = Number(n || 0);
      return num.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function hasVal(v) {
      if (v == null) return false;
      const s = String(v).trim();
      return s !== '' && s.toUpperCase() !== 'N/A' && s !== '—';
    }
    function visitStatusLabel(visit, billingRows) {
      if ((billingRows || []).some((b) => String(b.status || '').toUpperCase() === 'PAID')) return 'Paid';
      if ((billingRows || []).some((b) => String(b.status || '').toUpperCase() === 'PENDING')) return 'Pending payment';
      return 'Completed';
    }
    function kvField(label, value, opts = {}) {
      if (!hasVal(value) && !opts.allowZero) return '';
      const cls = opts.multiline ? 'v notes' : 'v';
      return `<div class="visit-kv"><div class="k">${procCellEsc(label)}</div><div class="${cls}">${procCellEsc(String(value))}</div></div>`;
    }
    function expandSection(title, inner) {
      const body = (inner || '').trim();
      if (!body) return '';
      return `<div class="visit-expand-block"><div class="visit-expand-title">${procCellEsc(title)}</div>${body}</div>`;
    }
    function compactList(items) {
      if (!items.length) return '';
      return `<ul class="visit-compact-list">${items.map((line) => `<li><span>${line.left}${line.sub ? `<div class="sub">${line.sub}</div>` : ''}</span>${line.right ? `<span class="shrink-0 tabular-nums text-gray-700">${line.right}</span>` : ''}</li>`).join('')}</ul>`;
    }
    function extractVisitTime(visit) {
      for (const b of visit.billing || []) {
        const raw = b.issuedAt || b.createdAt || b.paidAt;
        if (!raw || String(raw).length <= 10) continue;
        try {
          const d = new Date(raw);
          if (!Number.isNaN(d.getTime())) {
            return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          }
        } catch (_) {}
      }
      return '';
    }
    function visitAttachmentsForDate(visitDate) {
      const day = String(visitDate || '').slice(0, 10);
      if (!day) return [];
      return (visitMedicalRecordsCache || []).filter((r) => {
        if (!r?.attachmentUrl) return false;
        return String(r.recordDate || '').slice(0, 10) === day;
      });
    }

    let visitHistoryCache = [];
    let visitMedicalRecordsCache = [];
    let visitHistoryExpandedKey = null;
    let visitHistoryShowAll = false;
    const VISIT_PREVIEW_COUNT = 6;

    function groupPetVisits(taggedProcedures, prescriptions, billingRows) {
      const byProcedureId = new Map();
      const byPetDate = new Map();
      (prescriptions || []).forEach((rx) => {
        if (rx?.consultationProcedureId != null) {
          const k = Number(rx.consultationProcedureId);
          if (!byProcedureId.has(k)) byProcedureId.set(k, []);
          byProcedureId.get(k).push(rx);
        }
        const dateKey = String(rx?.date || '').slice(0, 10);
        if (!byPetDate.has(dateKey)) byPetDate.set(dateKey, []);
        byPetDate.get(dateKey).push(rx);
      });

      const grouped = new Map();
      (taggedProcedures || []).forEach(({ pr, index }) => {
        const diagnosis = extractDiagnosis(pr.notes || '');
        const key = `${pr.performedAt || ''}_${diagnosis}_${pr.vet || ''}_${pr.category || pr.name || ''}`;
        if (!grouped.has(key)) {
          grouped.set(key, {
            key,
            date: pr.performedAt || '',
            diagnosis,
            clinicalNotes: extractClinicalNotes(pr.notes || ''),
            vet: pr.vet || '',
            procedures: [],
            procedureIndexes: [],
            prescriptions: [],
          });
        }
        const row = grouped.get(key);
        row.procedures.push(pr);
        row.procedureIndexes.push(index);
        const rxs = pr.id != null ? (byProcedureId.get(Number(pr.id)) || []) : [];
        row.prescriptions.push(...rxs);
      });

      grouped.forEach((row) => {
        if (!row.prescriptions.length) {
          const fallbackKey = String(row.date || '').slice(0, 10);
          row.prescriptions = (byPetDate.get(fallbackKey) || []).slice();
        }
        const unique = new Map();
        (row.prescriptions || []).forEach((rx) => {
          if (rx && rx.id != null) unique.set(rx.id, rx);
        });
        row.prescriptions = Array.from(unique.values());
        row.billing = (billingRows || []).filter((b) => {
          if (Number(b.petId) !== Number(id)) return false;
          const billDate = String(b.issuedAt || b.createdAt || b.paidAt || '').slice(0, 10);
          return billDate === String(row.date || '').slice(0, 10);
        });
        row.totalCost = row.procedures.reduce((sum, p) => sum + Number(p.cost || 0), 0);
      });

      return Array.from(grouped.values()).sort((a, b) => {
        const byDate = String(b.date || '').localeCompare(String(a.date || ''));
        if (byDate !== 0) return byDate;
        const aId = Math.max(...(a.procedures || []).map((p) => Number(p.id || 0)), 0);
        const bId = Math.max(...(b.procedures || []).map((p) => Number(p.id || 0)), 0);
        return bId - aId;
      });
    }

    function buildVisitExpandedHtml(visit) {
      const status = visitStatusLabel(visit, visit.billing || []);
      const visitTime = extractVisitTime(visit);
      const chiefComplaint = visit.chiefComplaint || '';

      const visitDetailsInner = [
        kvField('Date', procFmtDate(visit.date)),
        kvField('Time', visitTime),
        kvField('Veterinarian', visit.vet),
        kvField('Visit status', status),
      ].filter(Boolean).join('');
      const visitDetails = expandSection('Visit details', `<div class="visit-kv-grid">${visitDetailsInner}</div>`);

      const medicalFields = [];
      if (hasVal(chiefComplaint) && chiefComplaint !== visit.diagnosis) {
        medicalFields.push(kvField('Chief complaint', chiefComplaint));
      }
      if (hasVal(visit.diagnosis)) medicalFields.push(kvField('Diagnosis', visit.diagnosis));
      if (hasVal(visit.clinicalNotes)) medicalFields.push(kvField('Clinical notes', visit.clinicalNotes, { multiline: true }));

      const medicalRecord = medicalFields.length
        ? expandSection('Medical record', `<div class="visit-kv-grid">${medicalFields.join('')}</div>`)
        : '';

      const serviceLines = (visit.procedures || [])
        .filter((p) => hasVal(p.name || p.labType))
        .map((p) => ({
          left: procCellEsc(p.name || p.labType),
          right: Number(p.cost) > 0 ? `₱${pesoVisit(p.cost)}` : '',
        }));

      const medLines = [];
      (visit.procedures || []).forEach((p) => {
        if (hasVal(p.medications)) {
          medLines.push({ left: procCellEsc(p.medications), right: '' });
        }
      });
      (visit.prescriptions || []).forEach((rx) => {
        const drug = [rx.drug, rx.dosage].filter(Boolean).join(' — ');
        if (!hasVal(drug)) return;
        const dirs = [rx.directions, rx.dispenseQty ? `Qty ${rx.dispenseQty}` : ''].filter(Boolean).join(' · ');
        medLines.push({
          left: procCellEsc(drug),
          sub: dirs ? procCellEsc(dirs) : '',

        });
      });

      const totalAmount = visit.totalCost > 0
        ? visit.totalCost
        : (visit.billing || []).reduce((s, b) => s + Number(b.amount || 0), 0);
      let paymentStatus = '';
      if ((visit.billing || []).length) {
        const statuses = [...new Set((visit.billing || []).map((b) => {
          const u = String(b.status || 'PENDING').toUpperCase();

        treatmentParts.push(`<div class="visit-sub-lbl">Services rendered</div>${compactList(serviceLines)}`);
      }
      if (medLines.length) {
        treatmentParts.push(`<div class="visit-sub-lbl">Prescribed medications</div>${compactList(medLines)}`);
      }
      const billingSummary = [];
      if (totalAmount > 0) billingSummary.push(kvField('Total amount', `₱${pesoVisit(totalAmount)}`));
      if (hasVal(paymentStatus)) billingSummary.push(kvField('Payment status', paymentStatus));
      if (billingSummary.length) {
        treatmentParts.push(`<div class="visit-kv-grid mt-2">${billingSummary.join('')}</div>`);
      }
      const treatmentBilling = treatmentParts.length
        ? expandSection('Treatment & billing', treatmentParts.join(''))
        : '';

        ? expandSection('Attachments', `<ul class="visit-attach-list">${attachments.map((r) => {

function getLocallySentReminderIds() {

function markReminderSentLocally(reminderId) {
  const r = petRemindersCache.find((x) => x.id === reminderId);
  if (r) {
    r.sent = true;
    r.sentAt = new Date().toISOString();
  }
  const ids = new Set(getLocallySentReminderIds().map(String));
  ids.add(String(reminderId));
  localStorage.setItem(PP_SENT_LOCAL_KEY, JSON.stringify([...ids]));
}

function applyLocalSentFlags(list) {
  const sentIds = new Set(getLocallySentReminderIds().map(String));
  return (list || []).map((r) => {
    if (r.sent || sentIds.has(String(r.id))) {
      return { ...r, sent: true, sentAt: r.sentAt || new Date().toISOString() };
    }
    return r;
  });
}

function cleanDisplayText(text) {
  if (!text) return text;
  return text.replace(/\{\{[^}]+\}\}/g, '').trim();
}

function getTemplateTitle(subject) {
  if (!subject) return 'REMINDER';
  let cleaned = cleanDisplayText(subject).toUpperCase();
  if (cleaned.includes('VACCINATION') || cleaned.includes('VACCINE')) return 'VACCINATION';
  if (cleaned.includes('FOLLOW-UP') || cleaned.includes('FOLLOW UP')) return 'FOLLOW UP';
  if (cleaned.includes('MISSED APPOINTMENT')) return 'MISSED APPOINTMENT';
  if (cleaned.includes('ANNUAL')) return 'ANNUAL CHECKUP';
  if (cleaned.includes('DEWORMING')) return 'DEWORMING';
  if (cleaned.includes('POST-SURGERY') || cleaned.includes('SURGERY')) return 'POST-SURGERY CARE';
  if (cleaned.includes('LAB TEST') || cleaned.includes('TEST RESULTS')) return 'LAB RESULTS';
  if (cleaned.includes('DENTAL')) return 'DENTAL CLEANING';
  if (cleaned.includes('GROOMING')) return 'GROOMING';
  if (cleaned.includes('BOARDING')) return 'BOARDING';
  if (cleaned.includes('PRESCRIPTION')) return 'PRESCRIPTION PICKUP';
  if (cleaned.includes('APPOINTMENT')) return 'APPOINTMENT';
  const words = cleaned.split(/\s+/).filter(Boolean).slice(0, 3);
  return words.join(' ') || 'REMINDER';
}

function extractSubject(message) {
  if (!message) return 'REMINDER';
  const lines = message.split('\n');
  for (let line of lines) {
    line = line.trim();
    if (line.startsWith('Subject:')) {
      const subject = line.replace(/^Subject:\s*/i, '').trim();
      return cleanDisplayText(subject) || 'REMINDER';
    }
  }
  const msgUpper = message.toUpperCase();
  if (msgUpper.includes('VACCINATION') || msgUpper.includes('VACCINE')) return 'VACCINATION';
  if (msgUpper.includes('FOLLOW-UP') || msgUpper.includes('FOLLOW UP')) return 'FOLLOW UP';
  if (msgUpper.includes('MISSED APPOINTMENT')) return 'MISSED APPOINTMENT';
  if (msgUpper.includes('ANNUAL') || msgUpper.includes('WELLNESS')) return 'ANNUAL CHECKUP';
  if (msgUpper.includes('DEWORMING')) return 'DEWORMING';
  if (msgUpper.includes('POST-SURGERY') || msgUpper.includes('SURGERY')) return 'POST-SURGERY CARE';
  if (msgUpper.includes('LAB TEST') || msgUpper.includes('TEST RESULTS')) return 'LAB RESULTS';
  if (msgUpper.includes('DENTAL')) return 'DENTAL CLEANING';
  if (msgUpper.includes('GROOMING')) return 'GROOMING';
  if (msgUpper.includes('BOARDING')) return 'BOARDING';
  if (msgUpper.includes('PRESCRIPTION')) return 'PRESCRIPTION PICKUP';
  if (msgUpper.includes('APPOINTMENT')) return 'APPOINTMENT';
  return 'REMINDER';
}

async function savePetReminder(){
  const date = document.getElementById('petReminderDate').value;
  const message = document.getElementById('petReminderMessage').value.trim();
  if(!date){ alert('Reminder date is required'); return; }
  if(!message){ alert('Reminder message is required'); return; }
  try{
    await Api.reminders.add({
      type:'PET',
      petId:id,
      ownerId:currentPet?.ownerId || null,
      date,
      message
    });
    closeModal();
    renderPetReminders();
  }catch(err){
    alert('Failed to save reminder: '+err.message);
  }
}

async function sendReminderEmail(reminderId){
  const templateSelect = document.getElementById('petReminderEmailTemplate');
  const subjectInput = document.getElementById('petReminderEmailSubject');
  const previewInput = document.getElementById('petReminderEmailPreview');
  const reminder = petRemindersCache.find(r=>r.id===reminderId);
  if(!reminder){
    alert('Reminder not found.');
    return;
  }
  const subject = subjectInput?.value || 'Bayport Reminder';
  const templateBody = (() => {
    const selectedId = templateSelect?.value;
    if(!selectedId) return previewInput?.value || '';
    const templates = templateCache[(reminder.type||'PET').toUpperCase()] || [];
    const selected = templates.find(t=>String(t.id)===selectedId);
    return selected?.body || previewInput?.value || '';
  })();
  const recipientLabel = reminder.ownerEmail || currentPet?.owner || 'Pet owner';

  const sendBtn = document.querySelector('[onclick*="sendReminderEmail"]');
  if (sendBtn) {
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
  }

  let demo = false;
  try {
    await Api.reminders.sendEmail(reminderId, {
      template: templateBody,
      subject,
    });
    markReminderSentLocally(reminderId);
  } catch (err) {
    if (!isDemoEmailMode()) {
      if (sendBtn) {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Email';
      }
      alert('Failed to send email: ' + (err.message || 'Unknown error'));
      return;
    }
    demo = true;
    markReminderSentLocally(reminderId);
  }

  closeModal();
  renderPetReminders();
  showEmailSentConfirmation({
    recipientLabel,
    subject,
    preview: templateBody,
    demo,
  });
}

async function deleteReminder(reminderId){
  if(!confirm('Delete this reminder?')) return;
  try{
    await Api.reminders.remove(reminderId);
    renderPetReminders();
  }catch(err){
    alert('Unable to delete reminder: '+err.message);
  }
}

async function getTemplates(type){
  const key = (type || 'PET').toUpperCase();
  if(!templateCache[key]){
    try{
      templateCache[key] = await Api.email.templates.list(key);
    }catch(err){
      console.warn('Could not load templates from backend, falling back to built-in defaults.', err);
      const all = (window.REMINDER_TEMPLATES || []).map(t => ({
        id: t.id,
        subject: t.subject,
        body: t.template
      }));
      if (key === 'PET') {
        templateCache[key] = all.filter(t => t.id !== 'general');
      } else {
        templateCache[key] = all.filter(t => t.id === 'general');
      }
    }
  }
  return templateCache[key];
}
