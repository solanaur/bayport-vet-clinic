<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet profiles - Bayport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif}
    .shadow-soft{box-shadow:0 4px 16px rgba(0,0,0,.05)}
    .shadow-card{box-shadow:0 2px 8px rgba(0,0,0,.08)}
    :root{--soft-teal:#0057b8}
    .pet-card-actions > summary{list-style:none}
    .pet-card-actions > summary::-webkit-details-marker{display:none}
    .pet-card-actions[open] > summary{z-index:30}
    #petFiltersPanel > summary{list-style:none}
    #petFiltersPanel > summary::-webkit-details-marker{display:none}
  </style>
</head>
<body class="bg-[#f6f9f9] min-h-screen flex flex-col">
  <header id="bpAppHeader"></header>

  <div class="flex flex-1">
    <aside class="w-72 bg-white border-r border-gray-200 p-6 shadow-soft">
      <h2 class="text-xl font-semibold text-[var(--soft-teal)] uppercase mb-4">Pet profiles</h2>
      <nav id="sidebarNav" class="flex flex-col space-y-2"></nav>
    </aside>

    <main class="flex-1 p-6 lg:p-8">
      <div class="bg-white rounded-2xl shadow-soft p-6 lg:p-8">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
          <div>
            <h3 class="text-2xl font-semibold text-gray-800 mb-1">Pet profiles</h3>
          </div>
          <div class="flex items-center gap-3 flex-wrap">
            <div class="relative flex-1 min-w-[200px]">
              <input id="petSearch" class="w-full border-2 border-gray-200 rounded-lg p-3 pl-10 focus:border-[var(--soft-teal)] focus:ring-2 focus:ring-[var(--soft-teal)]/20 outline-none transition-all" placeholder="Search name, owner, breed, species…">
              <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </div>
            <button id="printAllBtn" onclick="printAllPets()" class="px-4 py-3 rounded-lg border-2 border-[var(--soft-teal)] text-[var(--soft-teal)] font-semibold hover:bg-[var(--soft-teal)] hover:text-white shadow-sm hover:shadow-md transition-all duration-200 flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
              </svg>
              Print All Pets
            </button>
            <button id="addBtn" class="px-6 py-3 rounded-lg bg-gradient-to-r from-[var(--soft-teal)] to-[#1d4ed8] text-white font-semibold hover:from-[#1d4ed8] hover:to-[var(--soft-teal)] shadow-md hover:shadow-lg transition-all duration-200 flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Add Record
            </button>
          </div>
        </div>

        <!-- Filters (collapsible to reduce clutter) -->
        <details id="petFiltersPanel" class="mb-4 rounded-xl border border-gray-200 bg-gray-50/80 group">
          <summary class="cursor-pointer list-none px-4 py-3 text-sm font-semibold text-gray-800 flex items-center justify-between gap-2 hover:bg-gray-100/80 rounded-xl [&::-webkit-details-marker]:hidden">
            <span class="flex items-center gap-2">
              <svg class="w-4 h-4 text-[var(--soft-teal)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
              Filters
            </span>
            <span class="text-xs font-normal text-gray-500">Species · Age · Last visit · Attention</span>
          </summary>
          <div class="border-t border-gray-200 px-4 pb-4 pt-2 space-y-3">
            <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm">
              <span class="font-semibold text-gray-700">Species</span>
              <label class="inline-flex items-center gap-2 cursor-pointer"><input type="checkbox" id="species-canine" class="rounded border-gray-300 species-cb"> Canine</label>
              <label class="inline-flex items-center gap-2 cursor-pointer"><input type="checkbox" id="species-feline" class="rounded border-gray-300 species-cb"> Feline</label>
              <label class="inline-flex items-center gap-2 cursor-pointer"><input type="checkbox" id="species-other" class="rounded border-gray-300 species-cb"> Other</label>
            </div>
            <div class="flex flex-wrap items-end gap-4 text-sm">
              <label class="block">Age
                <select id="filter-age" class="mt-1 border-2 border-gray-200 rounded-lg px-3 py-2 bg-white min-w-[9rem]">
                  <option value="all">Any age</option>
                  <option value="0-1">0–1 years</option>
                  <option value="1-7">1–7 years</option>
                  <option value="7+">7+ years</option>
                  <option value="unknown">Age not set</option>
                </select>
              </label>
              <label class="block">Last visit
                <select id="filter-lastvisit" class="mt-1 border-2 border-gray-200 rounded-lg px-3 py-2 bg-white min-w-[11rem]">
                  <option value="all">Any</option>
                  <option value="30d">Within 30 days</option>
                  <option value="90d">Within 90 days</option>
                  <option value="1y">Within 1 year</option>
                  <option value="older">Over 1 year ago</option>
                  <option value="never">No visits recorded</option>
                </select>
              </label>
              <label class="block">Attention
                <select id="filter-status" class="mt-1 border-2 border-gray-200 rounded-lg px-3 py-2 bg-white min-w-[12rem]">
                  <option value="all">All pets</option>
                  <option value="attention">Needs attention (any badge)</option>
                  <option value="vacc">Vaccination due</option>
                  <option value="appt">Appointment soon</option>
                  <option value="follow">Follow-up suggested</option>
                </select>
              </label>
              <button type="button" id="clearFiltersBtn" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-white">Clear filters</button>
            </div>
          </div>
        </details>

        <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
          <p id="petCountLabel" class="text-sm text-gray-600"></p>
          <div class="flex items-center gap-2">
            <span class="text-sm font-medium text-gray-700">View</span>
            <button type="button" onclick="setViewMode('grid')" id="view-grid" class="px-3 py-2 rounded-lg border-2 border-[var(--soft-teal)] bg-[var(--soft-teal)] text-white font-medium transition-all duration-200 shadow-sm" title="Compact grid">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            </button>
            <button type="button" onclick="setViewMode('list')" id="view-list" class="px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-400 transition-all duration-200" title="List">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
          </div>
        </div>

        <div id="rows" class="grid gap-3"></div>

        <div id="paginationBar" class="mt-6 flex flex-wrap items-center justify-between gap-3 border-t border-gray-200 pt-4 hidden">
          <button type="button" id="pagePrev" class="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium hover:bg-gray-50 disabled:opacity-40">Previous</button>
          <span id="pageInfo" class="text-sm text-gray-600"></span>
          <button type="button" id="pageNext" class="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium hover:bg-gray-50 disabled:opacity-40">Next</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none max-w-sm"></div>

  <script src="assets/deploy-env.js"></script>
<script>window.USE_API=true;</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/app-header.js"></script>
  <script src="assets/medical-history.js"></script>
  <script>
    guard('pet-records');
    if (typeof initBayportAppHeader === "function") initBayportAppHeader(document.getElementById("bpAppHeader"), { accent: "soft-teal" });
    renderSidebar(document.getElementById('sidebarNav'), getRole(), 'pet-records.html');

    const rows = document.getElementById('rows');
    const q = document.getElementById('petSearch');
    const modalRoot = document.getElementById('modalRoot');
    const toastRoot = document.getElementById('toastRoot');
    const petCountLabel = document.getElementById('petCountLabel');
    const paginationBar = document.getElementById('paginationBar');
    const pagePrev = document.getElementById('pagePrev');
    const pageNext = document.getElementById('pageNext');
    const pageInfo = document.getElementById('pageInfo');
    let lastRawFile = null;
    const PAGE_SIZE = 24;
    let currentPage = 1;
    let currentViewMode = 'grid';

    window.showToast = function (msg) {
      if (!toastRoot) return;
      const el = document.createElement('div');
      el.className = 'pointer-events-auto rounded-lg border border-gray-200 bg-white px-4 py-3 text-sm text-gray-800 shadow-lg';
      el.textContent = msg;
      toastRoot.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    };

    const savedViewMode = localStorage.getItem('petRecordsViewMode');
    if (savedViewMode === 'list' || savedViewMode === 'grid') currentViewMode = savedViewMode;

    function lastProcedureDate(p) {
      const procs = p.procedures || [];
      if (!procs.length) return null;
      let best = '';
      procs.forEach((pr) => {
        const d = pr.performedAt || '';
        if (d && d > best) best = d;
      });
      return best || null;
    }

    function daysBetween(isoA, isoB) {
      const a = new Date(isoA + 'T12:00:00').getTime();
      const b = new Date(isoB + 'T12:00:00').getTime();
      return Math.floor((b - a) / 86400000);
    }

    function parseAgeYears(p) {
      if (p?.ageDisplay) {
        const s = String(p.ageDisplay).toLowerCase();
        const mo = s.match(/([\d.]+)\s*month/);
        if (mo) return Number(mo[1]) / 12;
        const wk = s.match(/([\d.]+)\s*week/);
        if (wk) return Number(wk[1]) / 52;
        const yr = s.match(/([\d.]+)\s*year/);
        if (yr) return Number(yr[1]);
      }
      if (p?.age == null || p?.age === "") return null;
      const n = Number(String(p.age).replace(/[^\d.]/g, ""));
      return Number.isFinite(n) && n > 0 ? n : null;
    }

    function parseAgeForForm(p) {
      if (p?.ageDisplay) {
        const s = String(p.ageDisplay).trim();
        const mo = s.match(/^([\d.]+)\s*month/i);
        if (mo) return { value: mo[1], unit: "months" };
        const wk = s.match(/^([\d.]+)\s*week/i);
        if (wk) return { value: wk[1], unit: "weeks" };
        const yr = s.match(/^([\d.]+)\s*year/i);
        if (yr) return { value: yr[1], unit: "years" };
      }
      if (p?.age != null && Number(p.age) > 0) return { value: String(p.age), unit: "years" };
      return { value: "", unit: "months" };
    }

    function buildPetAgePayload() {
      const raw = String(document.getElementById("f_ageValue")?.value || "").trim();
      const unit = document.getElementById("f_ageUnit")?.value || "months";
      if (!raw) return { age: null, ageDisplay: null };
      const val = parseFloat(raw);
      if (!Number.isFinite(val) || val <= 0) return { age: null, ageDisplay: null };
      const unitSingular =
        unit === "years" ? "year" : unit === "weeks" ? "week" : "month";
      const unitPlural =
        unit === "years" ? "years" : unit === "weeks" ? "weeks" : "months";
      const label = val === 1 ? unitSingular : unitPlural;
      const ageDisplay = `${val} ${label}`;
      let age = null;
      if (unit === "years") age = Math.round(val);
      else if (unit === "months") age = val >= 12 ? Math.floor(val / 12) : 0;
      else age = 0;
      return { age, ageDisplay };
    }

    function ageFieldHtml(editing) {
      const parsed = parseAgeForForm(editing);
      return `<label class="text-sm font-medium text-gray-700">Age
        <div class="flex gap-2 mt-1">
          <input id="f_ageValue" type="number" min="0" step="0.1" placeholder="e.g. 10" value="${parsed.value}" class="flex-1 border-2 border-gray-300 rounded-lg p-3 focus:border-[var(--soft-teal)] focus:ring-2 focus:ring-[var(--soft-teal)]/20 outline-none transition-all">
          <select id="f_ageUnit" class="border-2 border-gray-300 rounded-lg p-3 bg-white min-w-[7rem] focus:border-[var(--soft-teal)] outline-none">
            <option value="months" ${parsed.unit === "months" ? "selected" : ""}>Months</option>
            <option value="years" ${parsed.unit === "years" ? "selected" : ""}>Years</option>
            <option value="weeks" ${parsed.unit === "weeks" ? "selected" : ""}>Weeks</option>
          </select>
        </div>
        <span class="text-xs text-gray-500 mt-1 block">Use months for young pets (e.g. 10 months). Leave blank if unknown.</span>
      </label>`;
    }

    function computeBadges(p, apptsForPet) {
      const badges = [];
      const today = new Date().toISOString().slice(0, 10);
      const weekEnd = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
      for (const a of apptsForPet || []) {
        const d = String(a.date || '').slice(0, 10);
        const st = String(a.status || '').toLowerCase();
        if (d && d >= today && d <= weekEnd && st !== 'done') {
          badges.push({ lbl: 'Appt soon', cls: 'bg-sky-600 text-white' });
          break;
        }
      }
      const procs = p.procedures || [];
      let lastVacc = p.lastVaccinationDate ? String(p.lastVaccinationDate).slice(0, 10) : '';
      for (const pr of procs) {
        const d = pr.performedAt || '';
        if (!d) continue;
        const cat = String(pr.category || '').toLowerCase();
        const nm = String(pr.name || '').toLowerCase();
        if (cat.includes('vaccin') || nm.includes('vaccin') || nm.includes('rabies')) {
          if (!lastVacc || d > lastVacc) lastVacc = d;
        }
      }
      if (lastVacc && daysBetween(lastVacc, today) > 330) {
        badges.push({ lbl: 'Vaccination due', cls: 'bg-amber-500 text-white' });
      }
      const last = lastProcedureDate(p);
      if (last && daysBetween(last, today) > 180) {
        badges.push({ lbl: 'Follow-up?', cls: 'bg-violet-600 text-white' });
      }
      if (procs.length && (p.notes || '').toLowerCase().includes('follow')) {
        badges.push({ lbl: 'Follow-up', cls: 'bg-rose-600 text-white' });
      }
      return badges.slice(0, 3);
    }

    let lastFilteredTotal = 0;

    function badgesHtml(badges) {
      if (!badges || !badges.length) return '';
      return `<div class="absolute top-1 right-1 z-10 flex max-w-[65%] flex-wrap justify-end gap-0.5 pointer-events-none">${badges.map((b) => `<span class="rounded px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wide shadow ${b.cls}">${b.lbl}</span>`).join('')}</div>`;
    }

    /** Primary: view profile; optional start consultation (vet/admin); then record tools. */
    function cardCareMenuHtml(p, layout) {
      const fo = typeof window.isFrontOffice === "function" && window.isFrontOffice(window.getRole());
      const consultRow = fo
        ? ""
        : `<a href="consultations.html?petId=${p.id}" class="block w-full px-3 py-2 text-left text-gray-700 hover:bg-[var(--soft-teal)]/10">Start consultation</a>`;
      const wrapCls = layout === 'list' ? 'pet-card-actions relative shrink-0 z-20' : 'pet-card-actions relative z-20 mt-auto border-t border-gray-100';
      const sumCls =
        layout === 'list'
          ? 'list-none cursor-pointer rounded-md border border-gray-200 bg-white px-2 py-1 text-[10px] font-bold uppercase tracking-wide text-gray-600 hover:bg-gray-50'
          : 'list-none cursor-pointer w-full py-2 px-2 text-left text-xs font-semibold text-[var(--soft-teal)] hover:bg-gray-50 flex items-center justify-between gap-2';
      const panelCls = layout === 'list' ? 'absolute right-0 mt-1 w-48' : 'absolute left-0 right-0 top-full mt-0.5';
      return `<details class="${wrapCls}" onclick="event.stopPropagation()"><summary class="${sumCls}">${layout === 'list' ? 'Menu' : '<span>Actions</span><span class="text-[10px] font-normal text-gray-400">▼</span>'}</summary><div class="${panelCls} rounded-lg border border-gray-200 bg-white py-1 shadow-xl text-xs z-30"><a href="pet-profile.html?id=${p.id}" class="block w-full px-3 py-2.5 text-left font-semibold text-gray-900 hover:bg-gray-50 border-b border-gray-100">View profile</a>${consultRow}<hr class="my-0.5 border-gray-100"><button type="button" class="block w-full text-left px-3 py-2 text-gray-600 hover:bg-gray-50" onclick="openForm(${p.id})">Edit record</button><button type="button" class="block w-full text-left px-3 py-2 text-gray-600 hover:bg-gray-50" onclick="printPetProfile(${p.id})">Print PDF</button><button type="button" class="block w-full text-left px-3 py-2 text-red-600 hover:bg-red-50" onclick="delPet(${p.id})">Delete</button></div></details>`;
    }

    function speciesMatchesMulti(p) {
      const c = document.getElementById('species-canine')?.checked;
      const f = document.getElementById('species-feline')?.checked;
      const o = document.getElementById('species-other')?.checked;
      if (!c && !f && !o) return true;
      const sp = String(p.species || '').toLowerCase();
      const isC = sp.includes('canine') || sp.includes('dog');
      const isF = sp.includes('feline') || sp.includes('cat');
      if (c && isC) return true;
      if (f && isF) return true;
      if (o && !isC && !isF && sp) return true;
      if (o && !sp) return true;
      return false;
    }

    function ageMatches(p, filterVal) {
      if (!filterVal || filterVal === 'all') return true;
      const y = parseAgeYears(p);
      if (filterVal === 'unknown') return y == null;
      if (y == null) return false;
      if (filterVal === '0-1') return y >= 0 && y <= 1;
      if (filterVal === '1-7') return y > 1 && y <= 7;
      if (filterVal === '7+') return y > 7;
      return true;
    }

    function lastVisitMatches(p, filterVal, lastIso) {
      if (!filterVal || filterVal === 'all') return true;
      const today = new Date().toISOString().slice(0, 10);
      if (filterVal === 'never') return !lastIso;
      if (!lastIso) return filterVal === 'never';
      const days = daysBetween(lastIso, today);
      if (filterVal === '30d') return days <= 30;
      if (filterVal === '90d') return days <= 90;
      if (filterVal === '1y') return days <= 365;
      if (filterVal === 'older') return days > 365;
      return true;
    }

    window.setViewMode = function setViewMode(mode) {
      currentViewMode = mode;
      localStorage.setItem('petRecordsViewMode', mode);
      const gridBtn = document.getElementById('view-grid');
      const listBtn = document.getElementById('view-list');
      if (gridBtn && listBtn) {
        if (mode === 'grid') {
          gridBtn.className = 'px-3 py-2 rounded-lg border-2 border-[var(--soft-teal)] bg-[var(--soft-teal)] text-white font-medium transition-all duration-200 shadow-sm';
          listBtn.className = 'px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-400 transition-all duration-200';
        } else {
          listBtn.className = 'px-3 py-2 rounded-lg border-2 border-[var(--soft-teal)] bg-[var(--soft-teal)] text-white font-medium transition-all duration-200 shadow-sm';
          gridBtn.className = 'px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-400 transition-all duration-200';
        }
      }
      render();
    };

    function renderCompactCard(p) {
      const photoBlock =
        typeof renderPetPhotoHtml === 'function'
          ? renderPetPhotoHtml(p.photo, 'relative h-20 w-full shrink-0', 'object-cover w-full h-full')
          : `<div class="relative h-20 w-full shrink-0 bg-[var(--soft-teal)]"></div>`;
      const breed = p.breed ? String(p.breed) : '';
      const owner = p._ownerName || p.owner || '';
      const nm = p.name || 'Unnamed';
      const ageDisp = typeof window.formatPetAge === "function" ? window.formatPetAge(p) || "—" : p.age != null && String(p.age).trim() !== "" ? String(p.age) : "—";
      const vacc = typeof resolvePetLastVaccination === 'function' ? resolvePetLastVaccination(p) : null;
      const vaccLine = vacc && vacc.summary
        ? `<p class="text-[10px] text-gray-500 mt-1 line-clamp-2" title="${String(vacc.summary).replace(/"/g, '&quot;')}"><span class="text-gray-400">Last vacc:</span> ${vacc.place ? vacc.place : vacc.date || '—'}${vacc.vet ? ` · ${vacc.vet}` : ''}</p>`
        : '';
      return `
<div class="relative flex h-full min-h-[168px] flex-col rounded-lg border border-gray-200 bg-white shadow-card transition hover:border-[var(--soft-teal)]/40 hover:shadow-md overflow-visible group cursor-pointer" title="Open pet profile" onclick="viewPet(${p.id})">
  <div class="relative h-20 shrink-0 w-full overflow-hidden">
    ${photoBlock}
    ${badgesHtml(p._badges)}
  </div>
  <div class="flex flex-1 flex-col px-2.5 pt-2 pb-1 min-h-0">
    <h4 class="truncate text-sm font-bold text-gray-900">${nm}</h4>
    ${owner ? `<p class="truncate text-xs text-gray-600">${owner}</p>` : '<p class="text-xs text-gray-400">No owner</p>'}
    ${breed ? `<p class="truncate text-xs text-gray-500">${breed}</p>` : ''}
    <p class="text-xs text-gray-500 mt-0.5"><span class="text-gray-400">Age</span> ${ageDisp}</p>
    ${vaccLine}
  </div>
  ${cardCareMenuHtml(p, 'grid')}
</div>`;
    }

    function renderListRow(p) {
      const photoBlock =
        typeof renderPetPhotoHtml === 'function'

    function updatePagination(total) {
      lastFilteredTotal = total;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      if (!paginationBar || !pagePrev || !pageNext || !pageInfo) return;
      if (total <= PAGE_SIZE) {
        paginationBar.classList.add('hidden');
        return;
      }
      paginationBar.classList.remove('hidden');
      pagePrev.disabled = currentPage <= 1;
      pageNext.disabled = currentPage >= totalPages;
      pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${total} pets)`;
    }

    async function render() {
      try {
        const term = (q.value || '').trim().toLowerCase();
        const [petsRaw, apptsRaw] = await Promise.all([repoListPets(), Api.appts.list().catch(() => [])]);
        const pets = Array.isArray(petsRaw) ? petsRaw : [];
        const appts = Array.isArray(apptsRaw) ? apptsRaw : [];
        const apptsByPet = new Map();
        appts.forEach((a) => {
          const id = Number(a.petId);
          if (!id) return;
          if (!apptsByPet.has(id)) apptsByPet.set(id, []);
          apptsByPet.get(id).push(a);
        });

        let rowsData = await Promise.all(
          pets.map(async (p) => {
            let ownerName = p.owner || '';
            if (!ownerName && p.ownerId) {
              const o = await repoGetOwner(p.ownerId);
              ownerName = o ? o.fullName : '';
            }
            const ap = apptsByPet.get(Number(p.id)) || [];
            const badges = computeBadges(p, ap);
            const last = lastProcedureDate(p);
            return { ...p, _ownerName: ownerName, _badges: badges, _lastVisit: last };
          }),
        );

        if (term) {
          rowsData = rowsData.filter((p) => {
            const blob = [p.name, p.breed, p.species, p._ownerName, String(p.age || '')].join(' ').toLowerCase();
            return blob.includes(term);
          });
        }

        rowsData = rowsData.filter((p) => speciesMatchesMulti(p));

        const ageF = document.getElementById('filter-age')?.value || 'all';
        rowsData = rowsData.filter((p) => ageMatches(p, ageF));

        const lv = document.getElementById('filter-lastvisit')?.value || 'all';
        rowsData = rowsData.filter((p) => lastVisitMatches(p, lv, p._lastVisit));

        const st = document.getElementById('filter-status')?.value || 'all';
        if (st === 'attention') rowsData = rowsData.filter((p) => (p._badges || []).length > 0);
        else if (st === 'vacc') rowsData = rowsData.filter((p) => (p._badges || []).some((b) => b.lbl === 'Vaccination due'));
        else if (st === 'appt') rowsData = rowsData.filter((p) => (p._badges || []).some((b) => b.lbl === 'Appt soon'));
        else if (st === 'follow') rowsData = rowsData.filter((p) => (p._badges || []).some((b) => b.lbl === 'Follow-up?' || b.lbl === 'Follow-up'));

        const total = rowsData.length;
        if (petCountLabel) {
          petCountLabel.textContent = total === 1 ? '1 pet matches filters' : `${total} pets match filters`;
        }

        if (total === 0) {
          rows.innerHTML = `<div class="col-span-full py-12 text-center text-gray-500">No pets match your search or filters.</div>`;
          updatePagination(0);
          return;
        }

        updatePagination(total);
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageSlice = rowsData.slice(start, start + PAGE_SIZE);

        if (currentViewMode === 'list') {
          rows.className = 'space-y-2';
          rows.innerHTML = pageSlice.map((p) => renderListRow(p)).join('');
        } else {
          rows.className =
            'grid grid-cols-2 gap-2 sm:grid-cols-3 sm:gap-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8';
          rows.innerHTML = pageSlice.map((p) => renderCompactCard(p)).join('');
        }
      } catch (err) {
        console.error('Pet records render error', err);
        rows.innerHTML = `<div class="col-span-full py-12 text-center text-red-600">Unable to load pet records.</div>`;
      }
    }

    function wireFilters() {
      document.querySelectorAll('.species-cb').forEach((el) => el.addEventListener('change', () => { currentPage = 1; render(); }));
      ['filter-age', 'filter-lastvisit', 'filter-status'].forEach((id) => {
        document.getElementById(id)?.addEventListener('change', () => { currentPage = 1; render(); });
      });
      document.getElementById('clearFiltersBtn')?.addEventListener('click', () => {
        document.getElementById('species-canine').checked = false;
        document.getElementById('species-feline').checked = false;
        document.getElementById('species-other').checked = false;
        document.getElementById('filter-age').value = 'all';
        document.getElementById('filter-lastvisit').value = 'all';
        document.getElementById('filter-status').value = 'all';
        q.value = '';
        currentPage = 1;
        render();
      });
      pagePrev?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
      pageNext?.addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(lastFilteredTotal / PAGE_SIZE));
        if (currentPage < totalPages) { currentPage++; render(); }
      });
    }

                  <button type="button" id="webcamSnapBtn" class="px-4 py-2 rounded-lg bg-[var(--soft-teal)] text-sm font-semibold text-white hover:brightness-95">Capture</button>
                </div>
              </div>
            </div>
            <div class="mt-6 flex justify-end gap-3 border-t pt-4">
              <button class="px-5 py-2.5 border-2 border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-400 transition-all duration-200" onclick="closeModal()">Cancel</button>
              <button class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-[var(--soft-teal)] to-[#158a8a] text-white font-semibold hover:from-[#158a8a] hover:to-[var(--soft-teal)] shadow-md hover:shadow-lg transition-all duration-200" onclick="savePet(${editing?.id||''})">Save</button>
            </div>
          </div>
        </div>`;

      function field(id,label,val='',type='text'){return `<label class="text-sm font-medium text-gray-700">${label}<input id="f_${id}" type="${type}" value="${val??''}" class="w-full border-2 border-gray-300 mt-1 rounded-lg p-3 focus:border-[var(--soft-teal)] focus:ring-2 focus:ring-[var(--soft-teal)]/20 outline-none transition-all"></label>`;}
      function selectField(id,label,selected,options){const opts=options.map(o=>`<option ${o===selected?'selected':''}>${o}</option>`).join('');return `<label class="text-sm font-medium text-gray-700">${label}<select id="f_${id}" class="w-full border-2 border-gray-300 mt-1 rounded-lg p-3 focus:border-[var(--soft-teal)] focus:ring-2 focus:ring-[var(--soft-teal)]/20 outline-none transition-all">${opts}</select></label>`;}
      function gv(k){return document.getElementById('f_'+k).value;}

      let previewObjectUrl = null;
      function revokePreviewObjectUrl() {
        if (previewObjectUrl) {
          try {
            URL.revokeObjectURL(previewObjectUrl);
          } catch (_) {}
          previewObjectUrl = null;
        }
      }
      function stopPetWebcam() {
        const video = document.getElementById('webcamVideo');
        if (video && video.srcObject) {
          try {
            video.srcObject.getTracks().forEach((t) => t.stop());
          } catch (_) {}
          video.srcObject = null;
        }
        document.getElementById('webcamCaptureRoot')?.classList.add('hidden');
      }

      const photoInput = document.getElementById('photoInput');
      const photoPreview = document.getElementById('photoPreview');
      document.getElementById('photoChooseBtn')?.addEventListener('click', () => photoInput?.click());
      photoInput?.addEventListener('change', async (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        try {
          lastRawFile = f;
          revokePreviewObjectUrl();
          if (window.USE_API) {
            previewObjectUrl = URL.createObjectURL(f);
            photoPreview.innerHTML = `<img src="${previewObjectUrl}" class="absolute inset-0 z-10 w-full h-full object-cover" alt="">`;
          } else {
            currentPhoto = await fileToDataURL(f);
            photoPreview.innerHTML = `<img src="${currentPhoto}" class="absolute inset-0 z-10 w-full h-full object-cover" alt="">`;
          }
        } catch (_) {
          alert('Could not read image');
        }
        e.target.value = '';
      });

      const webcamRoot = document.getElementById('webcamCaptureRoot');
      const webcamErr = document.getElementById('webcamErr');
      function showWebcamErr(msg) {
        if (!webcamErr) return;
        webcamErr.textContent = msg;
        webcamErr.classList.remove('hidden');
      }
      document.getElementById('photoWebcamBtn')?.addEventListener('click', async () => {
        webcamErr?.classList.add('hidden');
        if (!navigator.mediaDevices?.getUserMedia) {
          showWebcamErr('Camera is not supported in this browser.');
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
          const video = document.getElementById('webcamVideo');
          if (video) {
            video.srcObject = stream;
            await video.play().catch(() => {});
          }
          webcamRoot?.classList.remove('hidden');
        } catch (err) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            const video = document.getElementById('webcamVideo');
            if (video) {
              video.srcObject = stream;
              await video.play().catch(() => {});
            }
            webcamRoot?.classList.remove('hidden');
          } catch (err2) {
            showWebcamErr(err2.message || err.message || 'Could not access camera. Try HTTPS, allow permission, or use Choose from files.');
          }
        }
      });
      function closeWebcamPanel() {
        stopPetWebcam();
        webcamErr?.classList.add('hidden');
      }
      document.getElementById('webcamCloseBtn')?.addEventListener('click', closeWebcamPanel);
      document.getElementById('webcamCancelBtn')?.addEventListener('click', closeWebcamPanel);
      webcamRoot?.addEventListener('click', (ev) => {
        if (ev.target === webcamRoot) closeWebcamPanel();
      });
      document.getElementById('webcamSnapBtn')?.addEventListener('click', () => {
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('webcamCanvas');
        if (!video || !canvas || !photoPreview) return;
        if (!video.videoWidth) {
          showWebcamErr('Camera is still starting — wait a moment and try again.');
          return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.drawImage(video, 0, 0);
        canvas.toBlob(
          (blob) => {
            if (!blob) {
              alert('Could not capture image');
              return;
            }
            lastRawFile = new File([blob], 'webcam-capture.jpg', { type: 'image/jpeg' });
            revokePreviewObjectUrl();
            if (window.USE_API) {
              previewObjectUrl = URL.createObjectURL(lastRawFile);
              photoPreview.innerHTML = `<img src="${previewObjectUrl}" class="absolute inset-0 z-10 w-full h-full object-cover" alt="">`;
            } else {
              currentPhoto = canvas.toDataURL('image/jpeg', 0.92);
              photoPreview.innerHTML = `<img src="${currentPhoto}" class="absolute inset-0 z-10 w-full h-full object-cover" alt="">`;
            }
            closeWebcamPanel();
          },
          'image/jpeg',
          0.92,
        );
      });

      const addressInput = document.getElementById('f_address');
      const ownerAddressInput = document.getElementById('f_ownerAddress');
      function setHomeAddress(val){
        if(addressInput){
          addressInput.value = val || '';
        }
      }

      // keyboard save/cancel
      const wrap=document.querySelector('.fixed.inset-0');
      function onKey(e){ if(e.key==='Enter'){ e.preventDefault(); savePet(editing ? editing.id : undefined); } if(e.key==='Escape'){ e.preventDefault(); closeModal(); } }
      wrap.addEventListener('keydown', onKey);
      document.getElementById('f_name').focus();

      const weightInp = document.getElementById('f_weight');
      if (weightInp) {
        weightInp.addEventListener('input', (e) => {
          let v = (e.target.value || '').replace(/[^\d.]/g, '');
          const parts = v.split('.');
          if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
          e.target.value = v;
        });
      }

      // Species → Breed dependent dropdown
      const speciesEl = document.getElementById('f_species');
      const breedEl = document.getElementById('f_breed');
      if(!speciesEl || !breedEl){ throw new Error('Form did not render correctly'); }
      function populateBreeds(){
        try{
          const sp = speciesEl.value;
          const list = (window.SPECIES_TO_BREEDS?.[sp]||[]);
          breedEl.innerHTML = `<option value=""></option>` + list.map(b=>`<option ${editing?.breed===b?'selected':''}>${b}</option>`).join('') + `<option ${editing?.breed && !list.includes(editing.breed)?'selected':''}>Others</option>`;
          breedEl.disabled = !sp;
          document.getElementById('wrap_breedOther').classList.toggle('hidden', breedEl.value!=='Others');
        }catch(err){ console.error(err); }
      }
      speciesEl.addEventListener('change', populateBreeds);
      populateBreeds();
      breedEl.addEventListener('change', ()=>{
        document.getElementById('wrap_breedOther').classList.toggle('hidden', breedEl.value!=='Others');
        if(breedEl.value!=='Others'){ document.getElementById('f_breedOther').value=''; }
      });

      // Owner selection/create UI
      const ownerMode = document.getElementById('ownerMode');
      ownerAddressInput?.addEventListener('input', ()=>{
        if(ownerMode?.value === 'create'){
          setHomeAddress(ownerAddressInput.value);
        }
      });
      const ownerSelect = document.getElementById('ownerSelect');
      const ownerCreate = document.getElementById('ownerCreate');
      const ownerResults = document.getElementById('ownerResults');
      const ownerSearch = document.getElementById('f_ownerSearch');
      let selectedOwnerId = editing?.ownerId || null;

      // Enforce 11-digit numeric phone entry at the input level
      const ownerPhoneInput = document.getElementById('f_ownerPhone');
      if (ownerPhoneInput) {
        ownerPhoneInput.setAttribute('type', 'tel');
        ownerPhoneInput.setAttribute('maxlength', '11');
        ownerPhoneInput.addEventListener('input', (e) => {
          const digitsOnly = (e.target.value || '').replace(/\D/g, '').slice(0, 11);
          e.target.value = digitsOnly;
        });
      }

      ownerMode.addEventListener('change',()=>{
        const m = ownerMode.value;
        ownerSelect.classList.toggle('hidden', m!=='select');
        ownerCreate.classList.toggle('hidden', m!=='create');
        if(m==='create'){
          setHomeAddress(ownerAddressInput?.value||'');
        } else {
          syncSelectedOwnerDetails();
        }
      });
      // Prefill search results
      (async function initOwnerSection(){
        if(selectedOwnerId){
          const o = await repoGetOwner(selectedOwnerId);
          if(o){
            ownerResults.innerHTML = `<div class='p-3 text-sm bg-green-50 border-2 border-green-200 rounded-lg'>Selected: <b>${o.fullName}</b> (${o.phone})</div>`;
            setHomeAddress(o.address||editing?.address||'');
          }
        } else {
          setHomeAddress(editing?.address||'');
        }
        renderOwnerSearch();
        await syncSelectedOwnerDetails();
      })();

      async function syncSelectedOwnerDetails(){
        if(!selectedOwnerId || ownerMode.value!=='select'){
          return;
        }
        try{
          const owner = await repoGetOwner(selectedOwnerId);
          if(owner){
            setHomeAddress(owner.address||'');
          }
        }catch(err){
          console.warn('Unable to load owner details', err);
        }
      }

      async function renderOwnerSearch(){
        try{
          const term = ownerSearch.value||'';
          const list = await repoSearchOwners(term);
          const selected = selectedOwnerId ? await repoGetOwner(selectedOwnerId) : null;
          const selectedRow = selected ? `<div class='p-3 text-sm bg-green-50 border-2 border-green-200 rounded-lg mb-2 flex items-center justify-between'>
            <span>Selected: <b>${selected.fullName}</b> (${selected.phone})</span>
            <button onclick="deleteOwner(${selected.id}, event)" class='text-red-600 hover:text-red-800 p-1' title='Delete owner'>
              <svg class='w-5 h-5' fill='none' stroke='currentColor' viewBox='0 0 24 24'>
                <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16'></path>
              </svg>
            </button>
          </div>` : '';
          ownerResults.innerHTML = selectedRow + (list.map(o=>{
            const isSelected = selectedOwnerId === o.id;
            return `<div class='px-3 py-2.5 text-sm hover:bg-gray-50 ${isSelected ? 'bg-green-50 border-l-4 border-green-400' : ''} flex items-center justify-between group rounded-lg transition-colors' data-id='${o.id}'>
              <span class='flex-1 cursor-pointer'>${o.fullName} — ${o.phone}${o.email ? ' — '+o.email : ''}</span>
              <button onclick="deleteOwner(${o.id}, event)" class='text-red-600 hover:text-red-800 p-1 opacity-0 group-hover:opacity-100 transition-opacity' title='Delete owner'>
                <svg class='w-5 h-5' fill='none' stroke='currentColor' viewBox='0 0 24 24'>
                  <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16'></path>
                </svg>
              </button>
            </div>`;
          }).join('') || `<div class='p-3 text-sm text-gray-500 text-center'>No results</div>`);
          ownerResults.querySelectorAll('[data-id]')?.forEach(el=>{
            const ownerRow = el;
            const clickableArea = ownerRow.querySelector('span');
            if (clickableArea) {
              clickableArea.addEventListener('click',async()=>{ 
                selectedOwnerId = Number(ownerRow.dataset.id); 
                await renderOwnerSearch(); 
                await syncSelectedOwnerDetails(); 
              });
            }
          });
        }catch(err){ console.error(err); alert('Owner search error: '+err.message); }
      }
      
      // Delete owner function
      window.deleteOwner = async function(ownerId, event) {
        if (event) {
          event.stopPropagation();
        }
        
        if (!confirm('Are you sure you want to delete this owner? This will also delete all associated pets and appointments.')) {
          return;
        }
        
        try {
          await Api.owners.remove(ownerId);
          
          // If this was the selected owner, clear selection
          if (selectedOwnerId === ownerId) {
            selectedOwnerId = null;
          }
          
          // Refresh the owner list
          await renderOwnerSearch();
          
          alert('Owner deleted successfully');
        } catch (err) {
          console.error('Error deleting owner:', err);
          const errorMsg = err.message || 'Failed to delete owner';
          alert('Error: ' + errorMsg);
        }
      };
      ownerSearch.addEventListener('input', renderOwnerSearch);

      const pendingMedRecords = [];
      const pfMrDate = document.getElementById('pf_mr_date');
      if (pfMrDate && !pfMrDate.value) pfMrDate.value = new Date().toISOString().slice(0, 10);

      function togglePfVaccFields() {
        const isVacc = document.getElementById('pf_mr_type')?.value === 'VACCINATION';
        document.querySelectorAll('.pf-vacc-only').forEach((el) => {
          el.classList.toggle('hidden', !isVacc);
        });
      }
      document.getElementById('pf_mr_type')?.addEventListener('change', togglePfVaccFields);
      togglePfVaccFields();

      function renderPendingMedList() {
        const el = document.getElementById('pfMedPendingList');
        if (!el) return;
        if (!pendingMedRecords.length) {
          el.innerHTML = '';
          return;
        }
        const labels = (typeof MedicalHistory !== 'undefined' && MedicalHistory.TYPE_LABEL) ? MedicalHistory.TYPE_LABEL : {};
        el.innerHTML = pendingMedRecords.map((r, i) => `
          <div class="flex items-center justify-between gap-2 rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm">
            <span><strong>${labels[r.recordType] || r.recordType}</strong> — ${r.title || 'Untitled'}${r.recordDate ? ' · ' + r.recordDate : ''}</span>
            <button type="button" class="text-red-600 text-xs font-semibold hover:underline" data-pending-idx="${i}">Remove</button>
          </div>`).join('');
        el.querySelectorAll('[data-pending-idx]').forEach((btn) => {
          btn.addEventListener('click', () => {
            pendingMedRecords.splice(Number(btn.dataset.pendingIdx), 1);
            renderPendingMedList();
          });
        });
      }

      document.getElementById('pfAddPendingBtn')?.addEventListener('click', () => {
        const recordType = document.getElementById('pf_mr_type')?.value || 'CLINICAL_NOTE';
        const title = (document.getElementById('pf_mr_title')?.value || '').trim();
        if (!title) { alert('Please enter a title for the medical record'); return; }
        const payload = {
          recordType,
          recordDate: document.getElementById('pf_mr_date')?.value || null,
          title,
          sourceClinic: (document.getElementById('pf_mr_clinic')?.value || '').trim(),
          veterinarian: (document.getElementById('pf_mr_vet')?.value || '').trim(),
          description: (document.getElementById('pf_mr_notes')?.value || '').trim(),
          externalRecord: true,
        };
        if (recordType === 'VACCINATION') {
          payload.vaccineType = (document.getElementById('pf_mr_vaccine')?.value || '').trim();
          payload.nextDueDate = document.getElementById('pf_mr_nextdue')?.value || null;
        }
        pendingMedRecords.push(payload);
        renderPendingMedList();
        document.getElementById('pf_mr_title').value = '';
        document.getElementById('pf_mr_notes').value = '';
        document.getElementById('pf_mr_vaccine').value = '';
        document.getElementById('pf_mr_nextdue').value = '';
      });

      async function refreshPetFormMedHistory(petId) {
        const wrap = document.getElementById('pfMedExistingList');
        if (!wrap || !petId || typeof MedicalHistory === 'undefined') return;
        try {
          const records = await MedicalHistory.loadRecords(petId);
          if (!records.length) {
            wrap.innerHTML = '<p class="text-sm text-gray-500 italic">No medical history recorded yet. Use + Add record to import external history.</p>';
            return;
          }
          const byType = {};
          records.forEach((r) => {
            if (!byType[r.recordType]) byType[r.recordType] = [];
            byType[r.recordType].push(r);
          });
          wrap.innerHTML = Object.entries(byType).map(([type, list]) => `
            <div>
              <h5 class="text-xs font-semibold text-gray-600 uppercase mb-1">${MedicalHistory.TYPE_LABEL[type] || type}</h5>
              ${list.map((r) => `<div class="border border-gray-100 rounded-lg p-2 mb-1 bg-gray-50 flex justify-between gap-2">
                <span>${r.title || '—'}${r.recordDate ? ' · ' + r.recordDate : ''}</span>
                <button type="button" class="text-[var(--soft-teal)] text-xs font-semibold shrink-0" data-edit-rec="${r.id}">Edit</button>
              </div>`).join('')}
            </div>`).join('');
          wrap.querySelectorAll('[data-edit-rec]').forEach((btn) => {
            btn.addEventListener('click', () => {
              MedicalHistory.openEditModal(petId, Number(btn.dataset.editRec), () => refreshPetFormMedHistory(petId));
            });
          });
        } catch (err) {
          wrap.innerHTML = '<p class="text-sm text-red-600">Could not load medical history.</p>';
        }
      }

      if (editing?.id) {
        refreshPetFormMedHistory(editing.id);
        document.getElementById('pfAddRecordBtn')?.addEventListener('click', () => {
          if (typeof MedicalHistory !== 'undefined') {
            MedicalHistory.openAddModal(editing.id, 'EXTERNAL_DOCUMENT', () => refreshPetFormMedHistory(editing.id));
          }
        });
      }

      window.closeModal = () => {
        stopPetWebcam();
        revokePreviewObjectUrl();
        modalRoot.innerHTML = '';
      };
      window.savePet=async(editId)=>{
        // Determine owner
        let ownerId = selectedOwnerId;
        let ownerName = null;
        if(ownerMode.value==='create'){
          const fullName = gv('ownerName').trim();
          const phone = gv('ownerPhone').trim();
          const email = (document.getElementById('f_ownerEmail')?.value||'').trim();
          const address = (document.getElementById('f_ownerAddress')?.value||'').trim();
          if(!fullName){ alert('Owner full name is required'); return; }
          if(!phone || !validatePhone(phone)){ alert('Valid phone is required'); return; }
          if(email && !validateEmail(email)){ alert('Email looks invalid'); return; }
          const created = await repoAddOwner({ fullName, phone, email, address });
          ownerId = created.id; ownerName = created.fullName;
        } else if(!ownerId) {
          alert('Please select an owner or choose Create New');
          return;
        } else {
          const o = await repoGetOwner(ownerId); ownerName = o? o.fullName : '';
        }

        let prevPet = null;
        if (editId) prevPet = await repoGetPet(editId);

        let breedValue = gv('breed');
        if(breedValue==='Others'){ breedValue = (document.getElementById('f_breedOther').value||'').trim(); }
        const agePayload = buildPetAgePayload();
        const base={
          name:gv('name'),
          species:gv('species'),
          breed:breedValue,
          gender:gv('gender'),
          age: agePayload.age,
          ageDisplay: agePayload.ageDisplay,
          color:(gv('color')||'').trim(),
          weight:(gv('weight')||'').trim(),
          dateOfBirth: readPetDobSave(),
          microchip: (gv('microchip') || '').trim() || null,
          owner:ownerName,
          address:addressInput?.value||'',
          federation:gv('federation')||'N/A',
          photo: window.USE_API ? (prevPet?.photo ?? null) : currentPhoto,
          ownerId,
          allergies: (document.getElementById('f_allergies')?.value || '').trim(),
          chronicConditions: (document.getElementById('f_chronic')?.value || '').trim(),
          knownMedications: (document.getElementById('f_meds')?.value || '').trim(),
          lastVaccinationDate: (document.getElementById('f_lastVaccDate')?.value || '').trim() || null,
          lastVaccinationPlace: (document.getElementById('f_lastVaccPlace')?.value || '').trim(),
          lastVaccinationVet: (document.getElementById('f_lastVaccVet')?.value || '').trim(),
        };
        let savedPetId = editId;
        try {
          if (editId) {
            await repoUpdatePet({ ...base, id: Number(editId), procedures: prevPet?.procedures || [] }, window.USE_API ? lastRawFile : currentPhoto);
          } else {
            const created = await repoAddPet({ ...base, procedures: [] }, window.USE_API ? lastRawFile : currentPhoto);
            savedPetId = created?.id ?? savedPetId;
          }
        } catch (e) {
          console.error(e);
          const msg = e?.message || 'Could not save pet or photo';
          if (typeof window.showToast === 'function') window.showToast(msg);
          else alert(msg);
          return;
        }
        if (savedPetId && pendingMedRecords.length && window.USE_API && Api.medicalRecords) {
          for (const rec of pendingMedRecords) {
            try {
              await Api.medicalRecords.create(savedPetId, rec);
            } catch (medErr) {
              console.warn('Medical record save failed:', medErr);
            }
          }
        }
        closeModal();
        if (typeof window.showToast === 'function') {
          window.showToast(editId ? 'Profile updated successfully' : `Pet saved (ID ${savedPetId}) — synced to database`);
        }
        render();
        if (savedPetId) viewPet(savedPetId);
      };
      } catch(err){ console.error(err); alert('Error opening form: '+err.message); modalRoot.innerHTML=''; }
    }

    document.getElementById('addBtn').onclick = () => openForm();
    wireFilters();
    q.addEventListener('input', () => { currentPage = 1; render(); });

    setViewMode(currentViewMode);
  </script>
</body>
</html>
