<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting…</title>
  <script>
    (function () {
      const q = new URLSearchParams(location.search);
      if (!q.has("tab")) q.set("tab", "rx");
      location.replace("consultations.html?" + q.toString());
    })();
  </script>
</head>
<body>
  <p>Prescriptions are now part of <a href="consultations.html?tab=rx">Consultations &amp; Rx</a>.</p>
</body>
</html>
