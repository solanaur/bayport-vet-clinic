<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing - Bayport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--soft-teal:#0057b8}body{font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="bg-[#f6f9f9] min-h-screen flex flex-col">
  <header class="w-full bg-[var(--soft-teal)] text-white flex items-center justify-between px-8 py-4 shadow">
    <div class="flex items-center gap-3">
      <img src="assets/logo.png" class="w-10 h-10 rounded bg-white p-0.5" alt="">
      <div>
        <h1 class="text-xl font-semibold">Billing</h1>
        <p class="text-xs text-white/80">Payment history and receipt printing</p>
      </div>
    </div>
    <button class="bg-white text-[var(--soft-teal)] px-4 py-2 rounded-md font-semibold hover:bg-gray-50" onclick="logout()">Logout</button>
  </header>

  <div id="billToast" class="fixed bottom-5 left-1/2 -translate-x-1/2 hidden z-50 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-lg"></div>

  <div class="flex flex-1">
    <aside class="w-72 bg-white border-r border-gray-200 p-6">
      <h2 class="text-lg font-semibold text-[var(--soft-teal)] uppercase mb-4">Menu</h2>
      <nav id="sidebarNav" class="flex flex-col space-y-2"></nav>
    </aside>

    <main class="flex-1 p-6">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200">
        <div class="flex flex-wrap gap-3 items-end">
          <div>
            <label class="text-xs text-gray-600">Search</label>
            <input id="searchInp" class="border rounded-md px-3 py-2 w-64" placeholder="Pet, owner, description" />
          </div>
          <div>
            <label class="text-xs text-gray-600">Status</label>
            <select id="statusSel" class="border rounded-md px-3 py-2">
              <option value="">All</option>
              <option value="PENDING">Pending</option>
              <option value="PAID">Paid</option>
            </select>
          </div>
          <button id="refreshBtn" class="border rounded-md px-4 py-2 hover:bg-gray-50">Refresh</button>
          <button id="newBtn" class="bg-[var(--soft-teal)] text-white rounded-md px-4 py-2 hover:brightness-95">New Billing</button>
          <p class="text-xs text-gray-500">Default printer is managed in <span class="font-semibold">Settings</span>.</p>
        </div>

        <div class="overflow-x-auto mt-5">
          <table class="w-full border-collapse text-sm">
            <thead>
              <tr class="text-left text-gray-600 border-b">
                <th class="py-3">Issued</th>
                <th class="py-3">Pet / Owner</th>
                <th class="py-3">Description</th>
                <th class="py-3">Amount</th>
                <th class="py-3">Status</th>
                <th class="py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="billingRows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div id="newBillModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-5">
      <h3 class="text-lg font-semibold mb-3">New Billing Record</h3>
      <div class="space-y-3">
        <input id="billPet" class="w-full border rounded-md px-3 py-2" placeholder="Pet name" />
        <input id="billOwner" class="w-full border rounded-md px-3 py-2" placeholder="Owner name" />
        <input id="billDesc" class="w-full border rounded-md px-3 py-2" placeholder="Description" />
        <input id="billAmount" type="number" min="0" step="0.01" class="w-full border rounded-md px-3 py-2" placeholder="Amount" />
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button id="billCancel" class="border rounded-md px-4 py-2 hover:bg-gray-50">Cancel</button>
        <button id="billSave" class="bg-[var(--soft-teal)] text-white rounded-md px-4 py-2 hover:brightness-95">Save</button>
      </div>
    </div>
  </div>
  <div id="previewModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl w-full max-w-4xl h-[85vh] flex flex-col shadow-xl">
      <div class="flex items-center justify-between px-4 py-3 border-b">
        <h3 class="font-semibold">Receipt Preview</h3>
        <button id="closePreviewBtn" class="border rounded-md px-3 py-1.5 hover:bg-gray-50">Close</button>
      </div>
      <iframe id="previewFrame" class="w-full flex-1"></iframe>
    </div>
  </div>

  <script src="assets/deploy-env.js"></script>
<script>window.USE_API=true;window.API_BASE=window.API_BASE||window.BAYPORT_API_BASE||(window.location.protocol==="file:"?"http://localhost:8080/api":window.location.origin+"/api");</script>
  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script>
    guard('billing');
    renderSidebar(document.getElementById('sidebarNav'), getRole(), 'billing.html');
    let billing = [];

    function toast(msg, isError) {
      const el = document.getElementById('billToast');
      el.textContent = msg;
      el.classList.remove('hidden', 'bg-emerald-700', 'bg-rose-700');
      el.classList.add(isError ? 'bg-rose-700' : 'bg-emerald-700');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.add('hidden'), 3800);
    }
    function fmtDate(v) {
      if (!v) return '—';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v).replace('T',' ').slice(0,19);
      return d.toLocaleString(undefined,{dateStyle:'short',timeStyle:'short'});
    }
    function esc(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function filteredRows() {
      const q = (document.getElementById('searchInp').value || '').trim().toLowerCase();
      const s = document.getElementById('statusSel').value;
      return billing.filter((r) => {
        if (s && r.status !== s) return false;
        if (!q) return true;
        const str = `${r.petName || ''} ${r.ownerName || ''} ${r.description || ''}`.toLowerCase();
        return str.includes(q);
      });
    }
    function renderRows() {
      const rows = filteredRows();
      const body = document.getElementById('billingRows');
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-400">No billing records.</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((r) => `
        <tr class="border-b">
          <td class="py-3">${fmtDate(r.issuedAt)}</td>
          <td class="py-3">${esc(r.petName || '—')}<div class="text-xs text-gray-500">${esc(r.ownerName || '—')}</div></td>
          <td class="py-3">${esc(r.description || '')}</td>
          <td class="py-3 font-semibold">₱${formatPrice(r.amount || 0)}</td>
          <td class="py-3">${esc(r.status || 'PENDING')}</td>
          <td class="py-3 text-right">
            ${r.status !== 'PAID' ? `<button class="bill-pay text-xs font-semibold text-emerald-700 hover:underline mr-3" data-id="${r.id}">Mark Paid</button>` : ''}
            <button class="bill-preview text-xs font-semibold text-indigo-700 hover:underline mr-3" data-id="${r.id}">Preview</button>
            <button class="bill-print text-xs font-semibold text-sky-700 hover:underline" data-id="${r.id}">Print</button>
          </td>
        </tr>
      `).join('');
    }
    async function loadBilling() {
      try {
        billing = await Api.billing.list();
        billing = Array.isArray(billing) ? billing : [];
        billing.sort((a,b)=> String(b.issuedAt||'').localeCompare(String(a.issuedAt||'')));
        renderRows();
      } catch (e) {
        toast((e.message || 'Unable to load billing').slice(0,140), true);
      }
    }
    async function markPaid(id) {
      try {
        await Api.billing.pay(id);
        toast('Billing record marked as paid.', false);
        await loadBilling();
      } catch (e) {
        toast((e.message || 'Unable to mark paid').slice(0,140), true);
      }
    }
    function billReceiptHtml(r) {
      const clinic = getClinicSettings?.() || {};
      const clinicName = esc(clinic.name || 'Bayport Veterinary Clinic');
      const clinicAddress = esc(clinic.address || '');
      const logoSrc = new URL('assets/logo.png', window.location.href).href;
      const logo = `<img src="${logoSrc}" alt="Clinic logo" style="max-height:58px;max-width:180px;display:block;margin-bottom:8px;" />`;
      const issueDate = fmtDate(r.issuedAt);
      const paidDate = fmtDate(r.paidAt || r.issuedAt);
      const status = esc(r.status || 'PENDING');
      return `<!doctype html><html><head><meta charset="utf-8"/><style>
      body{font-family:Arial,sans-serif;font-size:12px;padding:22px;color:#1f2937}
      .head{display:flex;justify-content:space-between;gap:20px;border-top:3px solid #1f4fa4;padding-top:10px}
      .invoice{font-size:36px;font-weight:800;color:#1f4fa4;letter-spacing:1px;margin:0 0 10px 0}
      .muted{color:#4b5563;font-size:11px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px}
      .label{font-weight:700;color:#111827}
      table{width:100%;border-collapse:collapse;margin-top:16px}
      th{font-size:11px;text-transform:uppercase;color:#1f4fa4;border-bottom:2px solid #1f4fa4;padding:6px 4px;text-align:left}
      td{padding:8px 4px;border-bottom:1px solid #e5e7eb}
      .right{text-align:right}
      .totalRow td{font-weight:700;border-top:2px solid #1f4fa4}
      </style></head><body>
      <div class="head">
        <div>
          <p class="invoice">INVOICE</p>
          ${logo}
          <p><span class="label">${clinicName}</span></p>
          <p class="muted">${clinicAddress}</p>
        </div>
        <div>
          <p><span class="label">Invoice No:</span> ${r.id}</p>
          <p><span class="label">Issue Date:</span> ${issueDate}</p>
          <p><span class="label">Paid Date:</span> ${paidDate}</p>
          <p><span class="label">Status:</span> ${status}</p>
        </div>
      </div>
      <div class="grid">
        <div>
          <p class="label">Billed To</p>
          <p>${esc(r.ownerName || 'Walk-in Client')}</p>
        </div>
        <div>
          <p class="label">Patient</p>
          <p>${esc(r.petName || 'Walk-in')}</p>
        </div>
      </div>
      <table>
        <thead>
          <tr><th>Item Details</th><th class="right">Qty</th><th class="right">Unit Price</th><th class="right">Total</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>${esc(r.description || 'Veterinary service')}</td>
            <td class="right">1</td>
            <td class="right">₱${formatPrice(r.amount || 0)}</td>
            <td class="right">₱${formatPrice(r.amount || 0)}</td>
          </tr>
          <tr class="totalRow">
            <td colspan="3" class="right">Grand Total</td>
            <td class="right">₱${formatPrice(r.amount || 0)}</td>
          </tr>
        </tbody>
      </table>
      </body></html>`;
    }
    async function printBilling(id) {
      const row = billing.find((x) => String(x.id) === String(id));
      if (!row) return;
      const preferredPrinter = getPreferredReceiptPrinter?.() || '';
      const html = billReceiptHtml(row);
      if (window.desktopBridge?.printReceipt) {
        const res = await window.desktopBridge.printReceipt({ html, silent: false, deviceName: preferredPrinter || undefined });
        if (!res || !res.ok) {
          await queueCloudPrint(html, preferredPrinter || "");
          toast('Local print failed; queued to cloud print agent.', true);
          return;
        }
      } else {
        await queueCloudPrint(html, preferredPrinter || "");
        toast('Receipt queued for cloud print agent.', false);
      }
    }
    function previewBilling(id) {
      const row = billing.find((x) => String(x.id) === String(id));
      if (!row) return;
      const html = billReceiptHtml(row);
      const modal = document.getElementById('previewModal');
      const frame = document.getElementById('previewFrame');
      frame.srcdoc = html;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    document.getElementById('closePreviewBtn').onclick = () => {
      const modal = document.getElementById('previewModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('previewFrame').srcdoc = '';
    };

    document.getElementById('searchInp').addEventListener('input', renderRows);
    document.getElementById('statusSel').addEventListener('change', renderRows);
    document.getElementById('refreshBtn').onclick = loadBilling;
    const modal = document.getElementById('newBillModal');
    function openNewModal() {
      document.getElementById('billPet').value = '';
      document.getElementById('billOwner').value = '';
      document.getElementById('billDesc').value = '';
      document.getElementById('billAmount').value = '';
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    function closeNewModal() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
    document.getElementById('newBtn').onclick = openNewModal;
    document.getElementById('billCancel').onclick = closeNewModal;
    document.getElementById('billSave').onclick = async () => {
      const petName = document.getElementById('billPet').value.trim();
      const ownerName = document.getElementById('billOwner').value.trim();
      const description = document.getElementById('billDesc').value.trim();
      const amount = Number(document.getElementById('billAmount').value);
      if (!petName) {
        toast('Pet name is required.', true);
        return;
      }
      if (!Number.isFinite(amount) || amount <= 0) {
        toast('Enter a valid amount.', true);
        return;
      }
      try {
        await Api.billing.create({ petName, ownerName, description, amount, status: 'PENDING' });
        toast('Billing record created.', false);
        closeNewModal();
        await loadBilling();
      } catch (e) {
        toast((e.message || 'Create failed').slice(0,140), true);
      }
    };
    document.getElementById('billingRows').addEventListener('click', async (e) => {
      const payBtn = e.target.closest('.bill-pay');
      if (payBtn) await markPaid(payBtn.getAttribute('data-id'));
      const printBtn = e.target.closest('.bill-print');
      const previewBtn = e.target.closest('.bill-preview');
      if (previewBtn) previewBilling(previewBtn.getAttribute('data-id'));
      if (printBtn) {
        try {
          await printBilling(printBtn.getAttribute('data-id'));
          toast('Billing receipt sent to printer.', false);
        } catch (err) {
          toast((err.message || 'Print failed').slice(0,140), true);
        }
      }
    });

    loadBilling();
  </script>
</body>
</html>
