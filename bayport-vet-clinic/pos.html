<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting…</title>
  <script>
    (function () {
      const q = new URLSearchParams(location.search);
      if (!q.has("checkout")) q.set("checkout", "1");
      location.replace("billing.html?" + q.toString());
    })();
  </script>
</head>
<body>
  <p class="p-6 text-gray-600">Redirecting to Billing…</p>
</body>
</html>
