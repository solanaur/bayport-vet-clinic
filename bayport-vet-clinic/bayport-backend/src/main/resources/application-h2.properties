# H2 Profile - Run WITHOUT MySQL (offline/standalone)
# Use: --spring.profiles.active=h2
# Database file: ./data/bayport-db.mv.db

spring.datasource.url=jdbc:h2:file:./data/bayport-db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

bayport.upload-dir=./data/uploads
server.port=8080

spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:file://,http://localhost:8080,http://127.0.0.1:8080}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:change_this_secret_key_to_something_very_long_and_secure_for_production_use_at_least_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.tos.version=v1.0
