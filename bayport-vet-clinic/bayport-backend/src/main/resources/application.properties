# Database Configuration (MySQL - Development Profile)
# For desktop/offline mode, use: --spring.profiles.active=desktop
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bayport_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# File Upload Configuration
bayport.upload-dir=uploads

# Server Configuration
server.port=8080

# CORS Configuration (for frontend integration)
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,file://}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===== LOG LEVELS =====
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bayport=DEBUG

# ===== LOG FILE OUTPUT =====
logging.file.name=logs/bayport.log
logging.logback.rollingpolicy.file-name-pattern=logs/bayport-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=10MB

#
# ===== EMAIL CONFIGURATION =====
# Email notifications are optional. If not configured, the system will log warnings but continue to function.
# You have provided a Gmail address and app password; these settings enable real email sending.
#
# NOTE: For security in a real deployment, you should move these values to environment variables
# or an external config, but they are inlined here to match your request.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.debug=false
spring.mail.properties.mail.debug=false

jwt.secret=${JWT_SECRET:change_this_secret_key_to_something_very_long_and_secure_for_production_use_at_least_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

bayport.storage.provider=${BAYPORT_STORAGE_PROVIDER:local}
