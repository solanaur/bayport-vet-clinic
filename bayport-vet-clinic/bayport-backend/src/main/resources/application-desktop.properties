# Desktop Profile - MySQL Database (Cloud-ready)
# Run database_setup.sql in MySQL Workbench first
# For cloud: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bayport_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

bayport.upload-dir=./data/uploads
server.port=8080

# CORS - add your cloud frontend URL when deploying
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:file://,http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://127.0.0.1:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

jwt.secret=${JWT_SECRET:change_this_secret_key_to_something_very_long_and_secure_for_production_use_at_least_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.tos.version=v1.0
