# Bayport "freecloud" stack: Koyeb + Supabase PostgreSQL + Netlify/Vercel static UI.
# Run with: --spring.profiles.active=freecloud
#
# Supabase on Render: use Session pooler (IPv4). Supabase → Connect → Session pooler.
# JDBC URL example (Seoul / ap-northeast-2, this project uses aws-1 pooler):
#   jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
# Username: postgres.<project-ref>   Password: SPRING_DATASOURCE_PASSWORD

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# SQL migrations under db/migration are MySQL-oriented; schema on Supabase is managed by Hibernate (ddl-auto=update).
spring.flyway.enabled=false
bayport.flyway.repair-before-migrate=false

spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Koyeb sets PORT; local test: server.port=8080
server.port=${PORT:8080}

# Comma-separated origins for your Netlify/Vercel site(s), e.g.
# https://your-clinic.netlify.app,https://*.netlify.app
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Demo-friendly: local disk under ./data/uploads (ephemeral on Koyeb unless you attach volume).
bayport.storage.provider=local
bayport.upload-dir=${BAYPORT_UPLOAD_DIR:./data/uploads}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.bayport=INFO
