# Bayport "freecloud" stack: Koyeb + Supabase PostgreSQL + Netlify/Vercel static UI.
# Run with: --spring.profiles.active=freecloud
#
# Supabase: Project Settings → Database → URI (use JDBC form below, not postgres://).
# Example JDBC URL:
#   jdbc:postgresql://db.<ref>.supabase.co:5432/postgres?sslmode=require

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Koyeb sets PORT; local test: server.port=8080
server.port=${PORT:8080}

# Comma-separated origins for your Netlify/Vercel site(s), e.g.
# https://your-clinic.netlify.app,https://*.netlify.app
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Demo-friendly: local disk under ./data/uploads (ephemeral on Koyeb unless you attach volume).
bayport.storage.provider=local
bayport.upload-dir=${BAYPORT_UPLOAD_DIR:./data/uploads}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.bayport=INFO
