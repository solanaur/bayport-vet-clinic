# Bayport "freecloud" stack: Koyeb + Supabase PostgreSQL + Netlify/Vercel static UI.
# Run with: --spring.profiles.active=freecloud
#
# Supabase on Render: use Session pooler (IPv4). Supabase → Connect → Session pooler.
# JDBC URL example (Seoul / ap-northeast-2, this project uses aws-1 pooler):
#   jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
# Username: postgres.<project-ref>   Password: SPRING_DATASOURCE_PASSWORD

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# SQL migrations under db/migration are MySQL-oriented; schema on Supabase is managed by Hibernate (ddl-auto=update).
spring.flyway.enabled=false
bayport.flyway.repair-before-migrate=false

spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Koyeb sets PORT; local test: server.port=8080
server.port=${PORT:8080}

# Comma-separated origins for your Netlify/Vercel site(s), e.g.
# https://your-clinic.netlify.app,https://*.netlify.app
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Demo-friendly: local disk under ./data/uploads (ephemeral on Koyeb unless you attach volume).
bayport.storage.provider=local
bayport.upload-dir=${BAYPORT_UPLOAD_DIR:./data/uploads}

# Render FREE tier blocks outbound SMTP (ports 465/587). Use HTTP email APIs instead.
bayport.email.cloud-prefer-resend=true
bayport.email.logo-url=${BAYPORT_EMAIL_LOGO_URL:https://bayport-vet-clinic-com.netlify.app/assets/logo.png}

bayport.reminders.dispatch-on-startup=false

# Netlify serverless relay — Brevo keys on Netlify; hook secret on Netlify + Render
bayport.email.netlify-function-url=${BAYPORT_EMAIL_NETLIFY_FUNCTION_URL:https://bayport-vet-clinic-com.netlify.app/.netlify/functions/send-email}
bayport.email.netlify-hook-secret=${BAYPORT_EMAIL_HOOK_SECRET:}
brevo.api-key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:bayport.vetclinic@gmail.com}
brevo.from.name=${BREVO_FROM_NAME:Bayport Veterinary Clinic}

# Resend: requires verified custom domain (onboarding@resend.dev = test mode, account email only)
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:Bayport Veterinary Clinic <onboarding@resend.dev>}

# SMTP kept for local/desktop only (ignored on cloud when cloud-prefer-resend=true)
spring.mail.host=smtp.gmail.com
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.bayport=INFO
