# Monorepo: static UI is bayport-vet-clinic/bayport-vet-clinic/ (index.html, assets/, …)
# Netlify site env → BAYPORT_API_BASE=https://YOUR-APP.koyeb.app/api

[build]
  base = "bayport-vet-clinic/bayport-vet-clinic"
  command = "node scripts/write-deploy-env.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
