# Render Blueprint — Bayport API (free tier)
# Dashboard: New → Blueprint → connect GitHub repo → paste this file path: render.yaml
# Fill secret env vars in Render after deploy (Database password, JWT, SMTP, CORS).

services:
  - type: web
    name: bayport-api
    runtime: docker
    plan: free
    rootDir: bayport-vet-clinic/bayport-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: freecloud
      # Copy exact Session pooler host + user from Supabase → Connect → Session pooler (do NOT guess aws-0 vs aws-1).
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_WEB_CORS_ALLOWED_ORIGINS
        value: https://adorable-daifuku-3966e7.netlify.app
