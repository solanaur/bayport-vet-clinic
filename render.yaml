# Render Blueprint — Bayport API (free tier)
# Dashboard: New → Blueprint → connect GitHub repo → paste this file path: render.yaml
# Fill secret env vars in Render after deploy (Database password, JWT, SMTP, CORS).

services:
  - type: web
    name: bayport-api
    runtime: docker
    plan: free
    rootDir: bayport-vet-clinic/bayport-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: freecloud
      # Session pooler (IPv4) — host/user from Supabase Connect for project gmyoopqvqvpybloqadix
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.gmyoopqvqvpybloqadix
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Render FREE blocks SMTP — use Resend (https://resend.com) API key over HTTPS
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: Bayport Veterinary Clinic <onboarding@resend.dev>
      - key: SPRING_MAIL_USERNAME
        value: bayportveterinaryclinic@gmail.com
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_WEB_CORS_ALLOWED_ORIGINS
        value: https://bayport-vet-clinic-com.netlify.app
